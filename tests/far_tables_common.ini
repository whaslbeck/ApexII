[options]
labels_are_entries = false ; labels only name addresses, entries classify code

[schemas]
menu_row = bytes[1], word, far_data ; trailing comments are ignored

[labels]
0x800c = InlineParam ; label name, not an implicit code entry
0x800d = InlineComplex

[entries]
0x800c = code
0x800d = code

[routine_docs]
0x800c = "Inline param doc with \; semicolon, \# hash, and \\ slash" ; comment outside quotes

[inline]
0x800c = byte:mode ; inline parameter name
0x800d = ptr16_data, far_data, ptr16_code, word, bytes[2]
