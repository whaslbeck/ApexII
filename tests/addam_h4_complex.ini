[routine_docs]
B3d_A7387 = "Clears Jackpot and Super Jackpot steady/blink state, clears lamp/effect mode 0x0340, refreshes bank-36 display/lamp state, refreshes playfield lamps, and updates the Electric Chair start lamp."
B3d_A734d = "Lights both Jackpot and Super Jackpot blink lamps and refreshes the jackpot-value display/lamp state through bank 36."
B3d_A7324 = "Computes the ramp Super Jackpot multiplier in B. Starts at 2, bumps to 3 when Thing Multiball/GREED/effect state and feature slot 0x01 allow it, matching the double-first/triple-later multiball rule."
B3d_A7280 = "Adds one million to the Big Multiball jackpot value only while Thing Multiball lamp 0xC1 and the Super Jackpot blink state are both active. Returns carry clear when it incremented the capped slot 0x15 value."
B3d_A726a = "Increments the Big Multiball jackpot base value in feature slot 0x15 and RAM 0x0588, capped at 0x19 (25M)."
B3d_A7229 = "Common Big Multiball jackpot award worker. Sets lamp 0x4A, stops effect 0x00B5, starts task 0x00B4, queues command 0x0E, builds a packed-BCD score from feature slot 0x15, and adds it B times."
B3d_A71f2 = "Awards the Big Multiball Ramp Super Jackpot. Clears jackpot/super-jackpot lamps, derives multiplier B through BigMultiball_GetRampJackpotMultiplierB, emits double/triple text for B=2/3, awards the jackpot multiplier, updates value state, refreshes lamps, and may finish Thing Multiball when ball count allows."
B3d_A71e1 = "Awards the Big Multiball Train Jackpot. Clears jackpot/super-jackpot lamps, awards one base jackpot unit through BigMultiball_AwardJackpotMultiplierB, refreshes playfield lamps, and returns."
B36_A6912 = "Train Wreck target award/advance worker. Advances feature slots 0x08/0x0B against the current cap, alternates extra-ball display scenes 0x23/0x24, or on maxed progress starts scene 0x25 and awards the larger train-wreck value."
B36_A68c9 = "Train Wreck target effect entry. Handles normal Train Wreck scoring/advance, but when Thing Multiball and the Jackpot lamp are active it takes the Big Multiball train-jackpot path, stops pending vault result effect 0x00E5, and refreshes related mode lamps."
B34_A68fe = "Sets encoded GREED lamp 0x53 and runs the two dependent refresh callbacks B36_A6BAF and B2f_A4859."
B34_A68d9 = "Updates GREED/lock star lamps from feature slot 0x12. Slot 0 clears mode 0x0900, slot 1 lights star lamp 0x39 and clears 0x3F, and slot 2+ sets lamp/effect mode 0x0900."
B34_A68a6 = "Advances the GREED/Thing lock progress after display effect 0x00A0. Stops that effect, clears the Stars lamp, increments feature slot 0x12 up to 2, and updates the star/lock lamps unless GREED lamp 0x53 is already set."
B34_A6894 = "GREED/vault lock relight helper. Sets tracked lamp/effect mode 0x0800, writes logic var 0x0800, and on accepted writes sets GREED lamp 0x53 and refreshes the dependent lamp/display callbacks."
B2f_A668e = "Draws the THING letters for the multiball jackpot animation. It walks a five-entry table for T/H/I/N/G, suppressing letters whose layer-00 lamp effects are not active unless GREED lamp 0x53 is already set."
B2f_A6665 = "Draws the text line used by the multiball jackpot animation. It emits the base centered string and chooses one of two follow-up strings depending on encoded GREED lamp 0x53."
B2f_A659d = "DisplayScene 96 jackpot/GREED award animation. Clears the Jackpot lamp, copies DMD planes 7/8, runs the repeated page/effect animation, draws Thing/Greed status text and THING letters, then returns to the foreground display scene."
B2f_A657b = "Draws the formatted value line for the bordered multiball/state scene. Uses Printf_Formatter with the value buffer at _SOL_HIGHPOWER_ENABLE_SHADOW and selects one of two centered text rows based on the sign of A."
B2f_A6522 = "DisplayScene 74 event loop. Flips DMD pages for 0x14 frames, then chooses between the GREED-qualified jackpot animation and the mansion-window fallback by testing encoded lamp 0x53, inactive mode 0x0800, and logic event 0x2001."
B2f_A6505 = "DisplayScene 74 multiball state intro. Selects the active DMD plane, clears scratch plane 0x3800, draws the bordered multiball/state text and formatted value line, then enters the page-flip/event-2001 loop."
B2f_A62c1 = "Adds a multiball jackpot-value/display step. Converts Y from BCD, caps/increments feature slot 0x14, awards score template 0x12 with the slot as multiplier, ORs in the caller flag byte, and starts DisplayScene 0x4A."
B2f_A6246 = "Million Plus Ramp multiball award gate. Tests logic event 0x2000, relights GREED/lock state when active, checks bank-34 ramp/super state, adds/display-updates the jackpot value via feature slot 0x14, then either awards the Super Jackpot path or falls through to normal combo/ramp scoring."
B2f_A4b88 = "Thing Multiball end/collection gate. If lamp 0xC1 is active it snapshots which Jackpot/Super-Jackpot lamps were blinking into RAM 0x05A5, optionally starts effect 0x00E5, then clears Thing Multiball, clears related lock/grave state, clears Jackpot/Super Jackpot lamps, and refreshes mode lamps."
B2f_A4ae4 = "Starts Thing Multiball. Clears feature slot 0x02, increments slot 0x01, emits the 2nd/3rd start texts when applicable, clears conflicting mansion/extra-ball/seance state, sets encoded lamp 0xC1, lights Jackpot/Super Jackpot through BigMultiball_LightJackpotAndSuperJackpot, starts task 0x00AD, and refreshes lamp programs."
B2f_A4a29 = "Big Multiball release and jackpot setup. Clears RAM 0x05A4, derives double/triple-jackpot setup from feature slot 0x12, queues command 0x34, spawns jackpot display/task work at 0x80E8, and increments feature slot 0x13 as the multiball count/progression marker."
B2f_A49e0 = "GREED-qualified big multiball start gate. Requires the GREED/E1 lamp-state gate and no conflicting effects, sets follow-up GREED/Cousin-It lamps, runs the multiball release/jackpot setup, clears the GREED-lock state through bank 34, and returns carry clear on success."
B2f_A4859 = "Rebuilds the Thing ramp/eject award lamps. It arbitrates Thing Multiball, Thing yellow, and Thing green based on active mode/effect blockers, GREED/vault qualification, jackpot state, and ball/lock limits\; clears all three when no Thing award is currently legal."
B2f_A4808 = "Updates the Electric Chair red/start lamp from active jackpot state. If Thing Multiball is running and Super Jackpot is available, or if the normal Jackpot lamp is qualified and the ball-count gate allows it, the chair red lamp is blinked\; otherwise it is cleared."
B2e_A4048 = "End-of-ball callback from SW_18. Clears encoded lamp/effect 0x4D and resets per-player feature/state slot 0x05 to 0."
B2e_A406a = "End-of-ball callback from SW_18. Reads logic var 0x0300, counts active display-effect slot counters 0x2B..0x2E, and when any are active clears/reinitializes group 0x03 through Bff_AFB4B(0x03,0x00)."
B2e_A5518 = "End-of-ball callback from SW_18. Wrapper around B2e_A561E\; clears encoded lamp/effect 0x48, clears four bits in feature slot 0x0A, then reselects a lamp/effect through logic gate 0x9A01."
B2f_A5402 = "DisplayEffectDescriptorTable_Main rows 58/59, including ID 0x3C. Starts/toggles support tasks around IDs 0x00FB..0x00FD, then jumps into the settings/attract value-frame path in bank 0x3B."
B2f_A540a = "Shared setup for the 0x3C settings/attract effect. If effect 0x0045 is not active it starts helper task 0x00FB\; if 0x00FD is active it stops it and starts task 0x00FC."
B2f_A5457 = "Task body started by AttractSettingsEffect_StartOrToggle45. Pulses DisplayEffect 0x01 and then DisplayEffect 0x3C once before detaching."
B2f_A5462 = "Task body started as 0x00FC. Attaches manual display-effect/control ID 0x0168 through DisplayEffect_AttachInlineWordId and detaches."
B2f_A6557 = "Direct caller of DMD_DrawFullFrameBorder_3800 used by display-scene row 74. Draws the common border, then chooses one-line or two-line multiball/state text based on the sign of A."
B34_A6377 = "DisplaySceneDescriptorTable_Main rows 85/86. Initializes DMD state, conditionally draws the common border when logic event 0x9502 is inactive, then runs the countdown/pulse frame sequence."
B34_A63b7 = "Tail of DisplayScene85_86_BorderedModeCountdown. Decrements the frame/page loop counter, repeats the page-flip/effect pulse, then hands off to the next display scene with active ID 0x56."
B34_A63c9 = "Inner frame renderer for DisplayScene85_86_BorderedModeCountdown. Clears/draws the DMD, conditionally draws the common border, then prints the centered 0x00AC text plus a formatted countdown/value line."
B34_A63f6 = "Worker task spawned as descriptor 0x788A from the right-flipper 0x7882 task. Runs a bank-3D display scene helper, executes the bank-34 effect package, then detaches."
B34_A6843 = "End-of-ball callback from SW_18. Reads logic var 0x0700, clears encoded lamp/effect 0x53, delays/iterates effect IDs 0x3A..0x3D, writes logic var 0x0800, and if accepted relights 0x53 plus follow-up mode callbacks."
B34_A6b5b = "Shared DMD award frame helper. Awards/display-calls ID 0xA4, performs the common DMD setup, clears the DMD, and draws the common full-frame border."
B34_A6d66 = "Shared blank bordered-frame setup used by several scenes. Runs the common DMD setup and draws DMD_DrawFullFrameBorder_3800, then returns for caller-specific text."
B34_A70c6 = "Instruction/award display flow. Cycles several text pages/effects\; for the repeated instruction page it clears the DMD, draws the common border, and emits centered strings 0x0061/0x0062/0x00C0."
B34_A7189 = "Final instruction branch reached via B34_A7177. Draws a fresh bordered frame, emits the final prompt block, then pulses the page/effect loop before returning to the display-scene handoff."
B34_A73ed = "DisplaySceneDescriptorTable_Main row 16 mansion/window award dispatcher. Clears encoded lamp/effect 0xE6, prepares the award mask and intro frame, then dispatches through MansionWindowAwards_BitmaskDispatchTable using RAM 0x06C0."
B34_A740f = "Mansion/window awards route for eligibility mask 0x00. Shows the base award path, tries the lamp-E6 side award, then runs the common finale/restore tail."
B34_A7418 = "Mansion/window awards route for eligibility mask 0x01. Shows the base path, optional slot-0C award, total/Lamp-E6 page, then the common finale/restore tail."
B34_A7424 = "Mansion/window awards route for eligibility mask 0x02. Shows the base path, pool 0x06DF/0x06EC/0x06F8 awards, total/Lamp-E6 page, then the common finale/restore tail."
B34_A7436 = "Mansion/window awards route for eligibility mask 0x03. Shows base, slot-0C, all pool awards, total/Lamp-E6 page, then the common finale/restore tail."
B34_A744b = "Mansion/window awards route for eligibility mask 0x04. Shows the base path, optional slot-04 award, lamp-E6 side award, then the common finale/restore tail."
B34_A7457 = "Mansion/window awards route for eligibility mask 0x05. Shows base, slot-0C, slot-04, lamp-E6 side award, then the common finale/restore tail."
B34_A7466 = "Mansion/window awards route for eligibility mask 0x06. Shows base, slot-0C, slot-04, all pool awards, total/Lamp-E6 page, then the common finale/restore tail."
B34_A747e = "Mansion/window awards route for eligibility mask 0x07. Shows base, slot-0C, slot-04, all pool awards, total/Lamp-E6 page, then falls through into the common finale/restore tail."
B34_A7493 = "Common mansion/window award finale tail. Claims DisplayEffect ID 0xA0E2, queues command descriptor 0x1A, displays award 0x8A, calls MansionAwardFinale_Run_B with B=0, stops 0xA0E2, then restores the previous display scene."
B34_A74ae = "Common mansion/window award exit. Jumps to DisplayScene_StopCurrentAndRestorePrevious after the finale is complete or when the DisplayEffect 0xA0E2 gate returns carry set."
B34_A74b1 = "Lamp-E6 side-award gate used during mansion/window awards. The side path is entered when the DisplayEffect 0xA0E2 gate returns carry set, lamp/effect 0xE6 is active, no extra balls are pending, and countdown 0x17B1 has expired. May set game-over/relay bit, start effects, spawn task 0x18DA, and display awards 0xA8/0xC0."
B34_A752e = "Mansion/window award setup. Rebuilds eligibility mask 0x06C0, clears or stops effect 0x18C0/lamp CA state, draws the intro/current-time frame, waits through two B3D timed gates, and copies score/work data into 0x06C1."
B34_A7584 = "Optional slot-0C award presenter. Tests feature-state slot 0x0C and runs MansionWindowAwards_ShowSlot0CAward when the slot is nonzero."
B34_A758c = "Tests feature-state slot 0x0C for mansion/window award eligibility. Carry clear means nonzero and eligible, carry set means absent."
B2f_A6444 = "Starts the first combo timing window by spawning DisplayEffect task 0x009C. This is the precursor checked by Combo_AdvBonusLoopAdvance for the right-inlane or Bear-kick-to-loop path."
B2f_A644d = "Adv Bonus X loop combo step. If window 0x009C is active, awards the intermediate 2M combo value, stops 0x009C, and starts window 0x009D for the Million Plus ramp. If no initial window is active, starts loop-first window 0x00EC."
B2f_A646f = "Million Plus ramp combo step. If window 0x009D is active, awards the 5M Three Way Combo, stops 0x009D, and starts window 0x009E for the optional Swamp/Four Way finish. If loop-first window 0x00EC is active, converts it to window 0x00ED for the Loop-Ramp-Swamp Three Way Combo."
B2f_A649d = "Swamp combo step. With active 0x0084 and 0x009E windows it awards the 10M Four Way Combo. Otherwise, if window 0x00ED is active, it awards the 5M Three Way Combo and stops 0x00ED."
B2f_A64c0 = "Task body for combo window 0x009C. Attaches DisplayEffect word ID 0x012C and exits, making the initial combo window timeout-managed by the scheduler."
B2f_A64c8 = "Task body for loop-first combo window 0x00EC. Waits 0xF0 ticks, then exits."
B2f_A64cf = "Task body for combo window 0x009D. Waits 0xB4 ticks after the Adv Bonus X loop advanced an initial combo window."
B2f_A64d6 = "Task body for loop-ramp combo window 0x00ED. Attaches DisplayEffect word ID 0x01A4 and exits."
B2f_A64de = "Task body for post-Three-Way window 0x009E. Attaches DisplayEffect word ID 0x01A4 and exits, allowing the Swamp shot to check for the Four Way Combo."
B2f_A64e6 = "Awards the intermediate 2M combo value used when the Adv Bonus X loop consumes the initial 0x009C window."
B2f_A64eb = "Awards the 5M Three Way Combo: adds score template 0x1C, queues command descriptor 0x33, and starts DisplayScene 0x29."
B2f_A64f8 = "Awards the 10M Four Way Combo: adds score template 0x13, queues command descriptor 0x33, and starts DisplayScene 0x2A."
B3b_A5ab8 = "Shared Adv Bonus X loop award path. Displays award 0x23, advances combo state through Combo_AdvBonusLoopAdvance, runs the related mode hook, optionally triggers a feature-slot 0x12 side effect, then adds the normal 200K loop value."
B34_A759a = "Slot-0C mansion/window award presentation. Builds score buffers, draws text 0x0047/0x0048 plus value 0x004E across DMD planes, displays award 0x5E, and copies the result into RAM 0x06C1."
B34_A765a = "Base mansion/window award presentation used by every mask route. Builds OUTHOLE_BONUS and 0x06BB buffers, selects text 0x004D or current-time text from feature slot 0x09, animates DMD planes 5/6, displays award 0x69 unless mask 0 does its alternate add path, and updates 0x06C1."
B34_A774a = "Shared mansion/window award pulse. Triggers lamp/sound FX 0x40, waits through the B3D timed gate with A=0x13 and B=0x1E, then restores A."
B34_A775d = "Optional slot-04 award presenter. Tests feature-state slot 0x04 and runs MansionWindowAwards_ShowSlot04Award when the slot value is greater than 1."
B34_A7766 = "Tests feature-state slot 0x04 for the mansion/window award path. Carry clear means the slot value is greater than 1, carry set means it is 0 or 1."
B34_A7775 = "Slot-04 mansion/window award presentation. Copies score buffers, draws the slot-selected text line 0x0049+, optionally adds the 0x05 packed award path for masks 4/5, otherwise displays award 0x6B, and returns with DMD plane 8 active."
B34_A7848 = "Optional 0x06DF pool award presenter. Tests the 0x06DF..0x06E3 pool and runs MansionWindowAwards_ShowPool06DFAward when any byte is nonzero."
B34_A7851 = "Tests the 0x06DF..0x06E3 mansion/window award pool. Carry clear means at least one nonzero byte, carry set means the pool is empty."
B34_A7867 = "0x06DF pool award presentation. Draws text 0x0023 and the packed pool value, displays award 0x6F, waits with DisplayEffect 0x64, and copies the pool value into 0x06C1."
B34_A78bc = "Optional 0x06EC pool award presenter. Tests the 0x06EC..0x06F0 pool and runs MansionWindowAwards_ShowPool06ECAward when any byte is nonzero."
B34_A78c5 = "Tests the 0x06EC..0x06F0 mansion/window award pool. Carry clear means at least one nonzero byte, carry set means the pool is empty."
B34_A78db = "0x06EC pool award presentation. Draws text 0x0041 and the packed pool value, displays award 0x70, waits with DisplayEffect 0x78, and copies the pool value into 0x06C1."
B34_A7930 = "Optional 0x06F8 pool award presenter. Tests the 0x06F8..0x06FC pool and runs MansionWindowAwards_ShowPool06F8Award when any byte is nonzero."
B34_A7939 = "Tests the 0x06F8..0x06FC mansion/window award pool. Carry clear means at least one nonzero byte, carry set means the pool is empty."
B34_A794f = "0x06F8 pool award presentation. Draws text 0x000F and the packed pool value, displays award 0x90, waits with DisplayEffect 0x64, and copies the pool value into 0x06C1."
B34_A79a4 = "Final total page for mansion/window award masks with pool/slot content. Draws text 0x005A with 0x06C1, pulses lamp FX 0x40, adds a packed 0x05 amount, sets lamp/effect 0xE6 if 0x06C2 >= 0x20, then may show award 0xC0 before returning to the finale tail."
B34_A7a20 = "Rebuilds mansion/window award eligibility mask RAM 0x06C0. Bit 0 reflects slot 0x0C, bit 1 reflects any of the 0x06DF/0x06EC/0x06F8 pools, and bit 2 reflects feature-state slot 0x04 greater than 1. Preserves A."
B34_A7a4e = "Tests the three packed mansion/window award pools as a group. Returns carry clear when any of 0x06DF..0x06E3, 0x06EC..0x06F0, or 0x06F8..0x06FC is nonzero."
B36_A4c5f = "Three Way Combo display scene. Clears/selects DMD, draws the full-frame border, emits text 0x0013 THREE WAY COMBO plus value text 0x00E8, displays award ID 0xCC, then runs the combo pulse/foreground tail."
B36_A4cc0 = "Four Way Combo display scene. Clears/selects DMD, draws the full-frame border, then falls into DisplayScene42_FourWayCombo_TextAndPulse for text 0x0014/0x00E9 and award ID 0xCD."
B36_A4cd2 = "Four Way Combo display-scene body. Draws centered strings 0x0014 FOUR WAY COMBO and 0x00E9, displays award ID 0xCD, starts effect 0x90, then jumps to the common display-scene pulse tail."
B36_A4cf8 = "DisplaySceneDescriptorTable_Main row 43 first page. Clears/selects DMD, emits header 0x00EA, draws the common border, then continues into the second bordered page."
B36_A4d12 = "Second page for DisplayScene43_BorderedMessageEA. Draws another bordered frame with centered message 0x00E0, then runs a repeated page-flip/effect pulse."
B36_A5489 = "DisplaySceneDescriptorTable_Main row 61. Runs common DMD setup, draws the common border, then emits row-specific text and optional award/logic branches."
B36_A5d14 = "DisplaySceneDescriptorTable_Main rows 20 and 88 wrapper. Runs MansionAwardFinale_Run_B, then jumps to the common DMD bit-transition/display-scene foreground tail at B36_A749B."
B36_A5d1d = "Mansion/window award finale presenter. Saves caller B as the text variant, selects a scratch DMD plane, clears the DMD animation slot pool, plays award/display calls 0xC1, 0xC2, 0x55, and 0xC9, queues two one-shot DMD animations from table selectors 0x3C/0x3D, overlays variant text, page-flips through timed DisplayEffect waits, triggers the one-shot 0x82 side effect, then restores A/B/X/Y/U."
B36_A5dd6 = "Mansion award finale text overlay helper. Uses B as variant selector: 0 draws text 0x00C4, 1 draws 0x00C5, other values draw the 0x00D5/0x00D6 pair. Preserves A/B."
B36_A6274 = "Small bordered text helper. Clears the DMD, draws DMD_DrawFullFrameBorder_3800, then draws the string addressed by U centered at y/coordinate 0x400D."
B36_A647f = "DisplaySceneDescriptorTable_Main row 48 first page. Clears DMD, draws message 0x001A, draws the common border, then continues to a second bordered page."
B36_A6493 = "Second page for DisplayScene48_BorderedModeMessage. Draws state text from 0x06C7 and then repeats the message/border before the page-flip pulse loop."
B36_A689b = "End-of-ball callback from SW_18. Clears bank-36 feature/state slot 0x08 and clears encoded lamp/effect 0xC2\; B36_A68A9 is the same reset with wider register save."
B36_A6b60 = "One-shot finale side-effect trigger. If RAM 0x06CD is clear, calls bank-3D helper B3D_A4D4E with A=0x82 and sets 0x06CD. Preserves A."
B36_A6d53 = "Static three-part status renderer. Selects buffer 0x3800, clears DMD, draws optional bordered title 0x0063, formatted line 0x0064, and value line 0x0065."
B36_A6d60 = "Animated three-part status renderer. Same content sequence as DMDScene_DrawThreePartStatusStatic, but inserts DisplayEffect 0x01 between the title, formatted line, and value line."
B36_A6d7a = "Second segment of the three-part status renderer. Formats string 0x0064 using current state and draws it centered near the bottom."
B36_A6d92 = "Third segment of the three-part status renderer. Formats value string 0x0065 and draws it left/right depending on the high-nibble status test."
B36_A6dc8 = "First segment of the three-part status renderer. Tests the current status high nibble\; if the test indicates the base state, draws DMD_DrawFullFrameBorder_3800 before centered title string 0x0063."
B36_A6dd7 = "Reads current status via Bff_Abab6 and tests the high nibble of byte 0,U by subtracting 1. Callers use the carry/result to decide whether a bordered base-state frame is needed."
B36_A6de4 = "Low-level DMD primitive: draws a full 128x32 rectangular border directly into DMD buffer 0x3800. It writes left/right edge bits for 32 rows, then fills the top and bottom 16-byte rows with 0xFF."
B36_A6e10 = "Display-effect row 41 service hook for the award-presentation block. If 0x0416 is active it runs Bff_A85A6(0x06), otherwise it detaches immediately."
B36_A6e8e = "Seance live handoff hook. During in-play it advances the easter-sequence phase detector before continuing the DB display-effect state machine."
B36_A6e9a = "Starts or advances the Seance DB side-effect state machine. If descriptor 0x00DB is absent it starts SeanceLive_DbPulseTask and initializes SEANCE_DB_EFFECT_PHASE=1, SEANCE_DB_EFFECT_COUNTDOWN=2."
B36_A6eaf = "Dispatches the Seance DB side-effect phase: phase 4 finalizes, phase 2 consumes live-handoff countdown ticks, all other unexpected phases stop descriptor 0x00DB."
B36_A6ec1 = "Phase-2 Seance DB live-handoff advance. Pulses effect 0x3C via descriptor 0x00DB, decrements SEANCE_DB_EFFECT_COUNTDOWN, then arms phase 3 with eleven expected 0x82 inputs."
B36_A6ed4 = "Final Seance DB completion package. Stops masked task 0x0060/0x01FC, awards display codes 0xAD and 0x2B, draws the custom text block package, starts effects 0x70/0x68, and runs the final game-mode callback."
B36_A6f03 = "Starts descriptor 0x00DB with SeanceLive_DbPulseTask."
B36_A6f0c = "One-shot Seance DB pulse task. Starts DisplayEffect ID 0x3C and detaches."
B36_A6f13 = "Seance-side effect 0x84 input handler called after the hidden-sequence counter is incremented."
B36_A6f33 = "Advances Seance DB phase 1 on effect 0x84 inputs. After two counted inputs it switches to phase 2 with a ten-tick live-handoff countdown."
B36_A6f46 = "Seance-side effect 0x82 input handler called after the hidden-sequence counter is incremented."
B36_A6f66 = "Advances Seance DB phase 3 on effect 0x82 inputs. After eleven counted inputs it switches to phase 4 so the next live-handoff finalizes the package."
B36_A6f79 = "Shared side path for 0x82/0x84 inputs. Starts descriptor 0x00FF, tests logic gate 0x1B01, and if effect 0x000C is not running calls the extra Seance helper at B36_A78B1."
B36_A6f97 = "Starts the shared-input one-shot task with descriptor 0x00FF."
B36_A6fa0 = "Shared-input one-shot task. Runs Bff_A8700(0x0B,0xB8) and detaches."
B36_A6fa8 = "Draw package used by the final Seance DB completion path\; copies several text/data blocks into DMD buffers before the final display effects."
B36_A712c = "DisplaySceneDescriptorTable_Main row 77 entry path. Builds a bordered base page, flips it once, then enters the looping prompt/effect sequence."
B36_A7132 = "Row 77 base renderer. Clears the DMD, draws DMD_DrawFullFrameBorder_3800, draws the row-specific prompt block, then enters the page-flip/effect loop."
B36_A7151 = "Row 77 conditional prompt renderer. Clears the DMD, draws the common border, draws the shared prompt block, and conditionally overlays text based on logic event 0x9502."
B36_A75ac = "Shared row 78/80 bordered page. Draws DMD_DrawFullFrameBorder_3800 and centered strings 0x0085/0x0086."
B36_A75c0 = "DisplaySceneDescriptorTable_Main row 80. Starts with the shared bordered page, then draws a second bordered decision/result page selected by lamp and logic-event gates."
B36_A76e5 = "Dimmed fallback instruction block for DisplayScene80_BorderedConditionalAwardFlow when logic event 0x9501 is already active. Draws strings 0x0091..0x0093 with dim attribute 0x0F, then falls into the bordered award/result page."
B36_A76fd = "Row 80 result page. Awards/display-calls 0xA4, clears DMD, draws the common border, stores active scene value 0x50, then runs the page-flip pulse tail."
B36_A7721 = "DisplaySceneDescriptorTable_Main row 81. Draws a bordered prompt with string 0x0094 and a logic-event-dependent 0x0095 line, then starts an award/pulse loop."
B36_A7743 = "Alternate line renderer for row 81 when logic event 0x9501 is already active. Uses the dimmer text attribute before entering the same pulse loop."
B36_A774b = "Row 81 pulse-loop setup. Awards/display-calls 0xA3/A2, queues command descriptor 0x0A, clears DMD, draws the common border, then starts the repeated page-flip/effect sequence."
B36_A78ff = "DisplaySceneDescriptorTable_Main row 49. Restores the active DMD plane from DMD_PLANE_B_CACHE, runs common setup, draws the common border, then continues to the state display body."
B36_A7902 = "Body of DisplayScene49_RestorePlaneAndDrawBorderedState. After plane restore/setup, draws DMD_DrawFullFrameBorder_3800 and jumps to the state text/effect renderer."
B36_A7db8 = "Resets the hidden easter sequence counters at 0x0729..0x072E."
B36_A7dd0 = "Three-phase easter-sequence evaluator. Recognizes 13/1/2 for the credits easter egg and 7/14/20 for When Cows Fight."
B36_A7df7 = "Stores the final phase-3 0x84 count and checks the 13/1/2 credits sequence before falling through to the cow check."
B36_A7e14 = "Checks the When Cows Fight sequence: 7/14/20 counts for 0x84/0x82/0x84, then queues command 0x3A."
B36_A7e2b = "Credits easter trigger tail\; queues command 0x39 before resetting the detector."
B36_A7e31 = "Clears the live 0x84/0x82 counters after a phase has been captured."
B36_A7e39 = "Increments the live hidden-sequence count for effect ID 0x84."
B36_A7e3d = "Increments the live hidden-sequence count for effect ID 0x82."
B36_A7e41 = "Queues hidden command 0x39, the credits easter egg."
B36_A7e46 = "Worker/guard task for the credits easter scene. While scene 0x5E is active it keeps effect 0x05 running, otherwise it detaches."
B36_A7e56 = "Credits easter foreground scene. Shows creator/developer text IDs 0x0115..0x011F with DMD effects."
B36_A7eb6 = "Draws and animates one text line in the credits easter foreground scene."
B36_A7f6b = "Queues hidden command 0x3A, the When Cows Fight easter egg."
B36_A7f70 = "When Cows Fight foreground scene. Loads cow DMD fullframes 0x95/0x96, starts display effect 0xC0, then enters DisplayScene_ForegroundTaskEntry."
B38_A470c = "Bank-38 end-of-ball entry reached from the bank-2F bonus/cleanup tail. Continues into descriptor 0x200E only when serve/live flag <0x8D is clear\; otherwise reports panic byte 0x45 and detaches."
B38_A4717 = "End-of-ball task gate. Swaps to the kernel stack, find-or-adds display/task descriptor 0x200E, and either services it or detaches if another owner already exists."
B38_A4724 = "Descriptor 0x200E service body. Sets the current descriptor, tests fixed-ROM end-of-ball readiness helper Bff_AB15B, and either prepares player advance/serve or clears presentation state and exits."
B38_A4733 = "Starts the deferred player-advance/serve transition. Raises <0x8E, waits for foreground/display work to quiesce, stops conflicting task families, waits for descriptor 0x3813, then advances or serves."
B38_A4750 = "Countdown tick inside EndOfBall_WaitForForegroundTaskLoop. Gives foreground task family 0x8000 up to 0xE1 iterations before forcing the transition cleanup path."
B38_A478a = "Final bank-38 end-of-ball decision point. Clears <0x8E, stops task family mask 0x1000, saves lamp blink phase, calls AdvanceToNextPlayerOrBall, then branches to same-ball serve on carry set or live-promotion path on carry clear."
B38_A47ab = "Same-player/current-ball serve path. Sets <0x8D, resets serve-monitor counters, runs persistent serve bookkeeping, assigns descriptor 0x000C, finalizes serve state, starts serve audit monitor, then resets display/runtime and re-enters BallStart_PrepareCurrentBallRuntime."
B38_A47e6 = "Tail of ServeCurrentPlayerBall_SameBallPath. Resets display scene/command runtime, calls BallStart_PrepareCurrentBallRuntime, emits logic/event marker 0x19, then detaches."
B38_A47f1 = "Common same-ball serve detach target."
B38_A47f4 = "Same-ball serve finalizer. Applies serve state 0x03 through B38_A4A94, clears <0x8C, optionally calls Bff_A985C through table flag 0x81BA, then runs B38_A480E and B38_A48DF presentation/audit helpers."
B38_A4b40 = "End-of-ball helper before AdvanceToNextPlayerOrBall. Selects the current player's runtime record, stores the current lamp-blink phase at player-record offset +0x20, then calls Bff_AA101."
B38_A4b50 = "Ball-start counterpart to B38_A4B40. Restores the saved lamp-blink phase from current player record +0x20 and marks player runtime state through B38_A4BBC/Bff_AA0AB."
B38_A4b74 = "Ball transition display reset. Clears command queue, clears display-scene runtime, and restores the fixed-ROM default display callback."
B38_A4c5d = "Sets RAM 0x04BD to 1. Used by AdvanceToNextPlayerOrBall and BallStart_RunCoreLiveSetup as a live/setup transition flag."
B38_A4c66 = "Clears RAM 0x04BD at the end of BallStart_CommitInPlayState."
B38_A4c6a = "Tests whether RAM 0x04BD is 1\; used by bank-39 serve/audit helpers."
B38_A4c82 = "Selects the current player's dynamic player record into X by reading CURRENT_PLAYER and calling PlayerState_SelectRecord_A_X."
B38_A4c8b = "Computes player record pointer X = PLAYER_RECORD_BASE + (A-1) * PLAYER_RECORD_SIZE. Panics with byte 0x38 for out-of-range player numbers."
B38_A4ca2 = "Reads one byte from the current player's feature-state slot B. Slot storage begins at player-record offset +0x25 and is bounds-checked against 0x04BC."
B38_A4cad = "Reads a two-byte feature-state value from consecutive current-player slots B/B+1 and returns it in X."
B38_A4cbe = "Writes A into current player's feature-state slot B. Slot storage begins at player-record offset +0x25 and is bounds-checked against 0x04BC."
B38_A4cc8 = "Writes a two-byte feature-state value from D into consecutive current-player slots B/B+1."
B38_A4cd5 = "Resolves current player's feature-state slot B to X. Slot index is 1-based and checked against slot count 0x04BC\; out of range panics with byte 0x46."
B38_A4d41 = "Resets serve-monitor counters/state: clears 0x04C1, 0x04C2, and <0x73>, then snapshots hardware/input byte 0x3FFB into 0x04C3."
B38_A4d61 = "Clears RAM 0x17A8 after same-ball serve finalization\; nearby monitor code sets 0x17A8 when serve counter 0x04C1 reaches 9."
B3b_A627b = "DisplaySceneDescriptorTable_Main row 46 loop. Repeatedly draws the bordered text16/17 page, flips planes, and starts DisplayEffect 0x06."
B3b_A6286 = "Row 46 frame renderer. Clears DMD, draws DMD_DrawFullFrameBorder_3800, then draws centered strings 0x0016 and 0x0017."
B3b_A636b = "Attract lamp-cycle gate used by routines that loop DisplayEffect 0x3C. It suppresses the cycle while task mask 0x0040/0x01F0 or effects 0x00F5/0x00A4/0x00AA are active\; otherwise it lets the cycle continue while the attract display lock 0x04DF is set or the idle sequence is otherwise allowed."
B3b_A6818 = "DisplaySceneDescriptorTable_Main row 67. Sets up a bordered formatted status page, with two conditional formatted text lines controlled by logic event 0x9502."
B3b_A693d = "DisplaySceneDescriptorTable_Main row 69. Awards/display-calls 0x8C, draws the common border, emits centered/formatted status text, then starts effect 0xC0."
B3b_A69cb = "End-of-ball callback from SW_18. Sets per-player feature/state slot 0x09 to 1 via Bff_A8658\; paired live code increments/tests the same slot and may start feature awards."
B3d_A4906 = "Clears three bytes at U, used with U=0x0416 to reset the award-presentation busy/owner block."
B3d_A4910 = "Sets byte 0,U to 1, used with U=0x0416 to mark the award-presentation block busy."
B3d_A4918 = "Queues owner B into bytes 1,U or 2,U when byte 0,U is idle. Carry set means owner was queued/already present\; carry clear means the block was already busy or the two-slot owner queue overflowed and byte 0,U was forced busy."
B3d_A6f2c = "Main DisplayEffect ID 0x0C handler. Calls the bank-36 seance/easter handoff, then blocks on active descriptors 0x7882/0x788A or jumps to BallStart_LiveEntryTask."
B3d_A7085 = "End-of-ball callback from SW_18. Sets per-player feature/state slot 0x18 to 2\; nearby B3d_A708F increments the same slot up to 0x0A during active play."
B3d_A7295 = "End-of-ball callback from SW_18. Resets Seance-side step state: stores 0x0A in RAM 0x0588 and feature/state slot 0x15 via B3d_A7298."
B3d_A73a7 = "stops active mansion mode timers and animations"
B3d_A73b1 = "Mansion progress award entry. Only runs while the award-presentation block is idle\; increments feature-state slot 0x07 up to 5, queues command 0x06, awards display value 0x2D, updates the lamp ladder, then marks 0x0416 busy."
B3d_A73ee = "Short Mansion progress award lamp task: waits/effects for 0x08 ticks, sets encoded lamp 0xEA, then detaches."
B3d_A73f9 = "Rebuilds the Mansion progress lamp ladder from feature-state slot 0x07 using RAM table 0x0581 and helper Bff_ABA4E."
B3d_A777a = "DMD scratch-plane setup helper. Selects a plane starting at 3 that is not the active/cached planes in <0x97>/<0xD7>/<0xD8, selects buffer 0x3800, clears/draws the DMD task, and preserves A."
B3d_A77a5 = "Mansion/window award timed wait helper. Polls sound-card data, then enters the B3D A/B timed gate using the caller A/B values. Carry reflects whether the gate matched before timeout."
B3d_A785c = "Clears the DMD animation slot pool at 0x060C..0x06B3 and clears the 0x06B4 word. Preserves A/B/X."
B3d_A7870 = "Allocates one 0x15-byte DMD animation slot from 0x060C..0x06B3. Stores caller X/Y as animation position/source pointers, stores caller B as the graphic/table selector, initializes counters and callbacks, and returns carry set when no slot is free."
B3d_A78b3 = "Services the DMD animation slot pool. For every active slot it optionally calls a per-slot callback, draws/advances the current frame through DMD_AnimFrame_DrawAndAdvance_A_B_XY, applies velocity/counter updates, clears expired one-shot slots, and runs optional completion callbacks."
B3d_A784b = "Task target for right-flipper descriptor 0x7882. It calls a small setup helper, spawns descriptor 0x788A with Effect788A_RightFlipperWorkerTask, then detaches."
Bff_A4001 = "Status/restart task spawned after the magic 0x1ABC soft restart path. Rebuilds runtime/NVRAM context, loops operator status pages, then exits through the restart decision helper."
Bff_A4065 = "Status report loop: calls StatusReport_ShowOperatorPages and, while it returns carry clear, runs a small follow-up table at 0x46F6 before looping."
Bff_A4076 = "Status report exit path. Performs a short status/effect delay and jumps to RestartDecision_ResetOrSoftRestartByStatusMode."
Bff_A41ce = "Operator/status DMD page carousel used by the restart/status flow. It draws several status pages/messages and watches the status input helpers for cycle/exit decisions."
Bff_A4223 = "Status report input wait helper. Uses Bff_A8698 with timeout 0xA0/0xFF depending on A and returns carry according to whether a relevant input was seen."
Bff_A4234 = "Classifies the current status input as an exit-class input."
Bff_A4240 = "Classifies the current status input as a page-cycle input and normalizes A to 1."
Bff_A4247 = "Draws the common status report header/state block before the current status page body."
Bff_A42cf = "Draws the current status-mode page. It uses 0x17A7 when present, otherwise validates 0x17A6 and either prints the live status detail or a fallback formatted message."
Bff_A49ce = "Selects high-score table entry B from the table descriptor in X. Returns U at the 8-byte entry and Y at the 3-byte initials subfield."
Bff_A49eb = "Validates a high-score descriptor and repairs/rebuilds it from default logic variables if the table contents fail initials/score validation."
Bff_A4aad = "Inserts the passed score/initials into the selected high-score table, shifts lower entries down, copies the 5-byte score plus 3-byte initials, and updates NVRAM checksum block A."
Bff_A4b1b = "Rebuilds a high-score table from descriptor X. Uses descriptor byte +6 as first logic-variable/default ID, descriptor count +3, and descriptor far pointer +4 to seed initials/score defaults, then updates checksum block +2."
Bff_A4c50 = "Tests whether a high-score descriptor is eligible/active before display or insert. The Grand Champion descriptor at 0x4BD5 is additionally gated by logic event 0xA401\; all descriptors then validate/repair through HighScoreTable_ValidateOrRepair_X."
Bff_A4dbd = "Runs the replay/free-game award presentation selected by adjustment/state 0x8E. Case 0 awards/display one replay credit, case 1 runs alternate presentation and message task 6, case 2 uses fallback presentation, otherwise no-op."
Bff_A4de8 = "Late boot/game initialization phase. Reinitializes display/runtime queues, resets command/display state, then enters StatusMode_EnterOrRefresh before continuing into normal Start_Game bring-up."
Bff_A4e3a = "Replay award fallback that builds a 5-byte packed-BCD score source from configured pointer 0x818A and adds it once through Score_AddImmediatePackedBcd_A_TimesB."
Bff_A4e57 = "Awards replay/free-game credit when the replay-credit gate allows it, updates serve-audit/NVRAM counters, spawns display scene 0x14, and accumulates the awarded count in RAM 0x050B."
Bff_A4e95 = "Credit/replay presentation wrapper: awards credit via ReplayCredit_AwardAndDisplay and, when A is non-zero, spawns a replay-credit message task with message selector B."
Bff_A4e9e = "Spawns replay-credit award message task 0x001D at the current cursor. B is the message/presentation selector consumed by the spawned task."
Bff_A4f17 = "Alternate replay-credit presentation prelude used by replay award modes 1/0x8F case 1 before spawning a message task."
Bff_A4fba = "Replay-credit fallback presentation used by replay award mode 2."
Bff_A5888 = "Tests whether status-mode code 0x17A6 represents a valid visible status page. Codes 0, 1, 0x0C, and >0x0B are rejected\; normal status pages are 2..0x0B."
Bff_A5b6c = "Serve-audit gate helper used when consuming pending replay/credit state. It calls ServeAudit_TestCommitGate and, if that reports blocked, runs an additional clear/consume side effect before returning carry state to the caller."
Bff_A5b73 = "Serve-audit commit gate. If far state pointer 0x817B is non-zero it returns carry clear directly\; otherwise it tests logic event 0xC001 to decide whether pending replay/credit state may be committed."
Bff_A5fcf = "Main DisplayEffect row 17 for hold-start restart. Gates through display/logic preconditions, shows the confirmation prompt/text, clears active tasks, marks status/restart mode 0x17A4=0x13, and falls into the hold countdown."
Bff_A6042 = "Hold-start restart tail that flips the DMD page, starts effect delay 0x40, then jumps into the fixed-bank countdown."
Bff_A6049 = "Tail jump into StartButtonHoldRestart_CountdownThenReset."
Bff_A6115 = "Replay/free-game threshold handler. Called after Score_CheckReplayThresholds reaches a threshold\; records the event in serve-audit/NVRAM state, updates checksums, then runs the replay presentation."
Bff_A61cf = "Returns replay/free-game threshold B from the active threshold table at 0x041D. Carry set means B is outside the active threshold count 0x0425."
Bff_A61fa = "DisplayEffect entry for the Million Plus / side-ramp gate. It resolves overlapping ramp/effect state, then falls through to the 5130-point ramp-gate award and ramp-diverter pulse path."
Bff_A6204 = "Million Plus / side-ramp gate award body. Scores ScoreAwardTemplate ID 0x27 = 5130 points, pulses the Ramp Diverter output, shows award message 0x25, then detaches the display effect."
Bff_A6266 = "Adds A credits/replay units into the serve-audit NVRAM block at 0x1CB5, marks 0x1CB7 pending, and refreshes checksum block A."
Bff_A6296 = "Ball-start serve-audit handoff. Loads the 0x1CB3 NVRAM block, clears pending/latch flags 0x1CB6..0x1CB8, marks 0x1CBA for commit, updates checksum, then consumes one pending replay/credit unit if needed."
Bff_A62b3 = "First-ball/intro serve-audit entry that only consumes or latches pending replay/credit state through ServeAudit_ConsumePendingCreditOrLatch."
Bff_A62b6 = "Consumes one pending replay/credit unit from 0x1CB5 if present, probes ServeAudit_TryConsumeReplayCreditGate, and on blocked gate latches 0x1CB6 and clears 0x1CB5 before refreshing checksum."
Bff_A62fe = "DisplayEffect entry for the Bear Kick / center-ramp gate. It handles overlapping ramp/effect state and then reaches the 5130-point score-only ramp-gate award body."
Bff_A632a = "Bear Kick / center-ramp gate award body. Scores ScoreAwardTemplate ID 0x27 = 5130 points and detaches without firing the ramp-diverter pulse."
Bff_A6d69 = "Small 15-frame delay helper used by the right-flipper spawned 0x788A worker before running the bank-34 status/effect package."
Bff_A73e4 = "Status-mode helper reached by raw switch 0x43. Sets RAM flag 0x06C6 to 1 and returns without drawing a page."
Bff_A84a3 = "Inline one-byte wrapper for setting a logical lamp in LAMP_MATRIX_LOGICAL."
Bff_A84b2 = "Inline one-byte wrapper for clearing a logical lamp in LAMP_MATRIX_LOGICAL."
Bff_A84c1 = "Inline one-byte wrapper for pulsing/toggling a logical lamp in LAMP_MATRIX_LOGICAL."
Bff_A84d0 = "Inline one-byte wrapper for testing a logical lamp in LAMP_MATRIX_LOGICAL."
Bff_A8507 = "Inline one-byte wrapper for setting an encoded high lamp/effect ID through the 0x48/0x50 shadow layer mapping."
Bff_A8516 = "Inline one-byte wrapper for clearing an encoded high lamp/effect ID through the 0x48/0x50 shadow layer mapping."
Bff_A8525 = "Inline one-byte wrapper for pulsing/toggling an encoded high lamp/effect ID through the 0x48/0x50 shadow layer mapping."
Bff_A8534 = "Inline one-byte wrapper for testing an encoded high lamp/effect ID through the 0x48/0x50 shadow layer mapping."
Bff_A8543 = "Inline one-byte wrapper for setting a bit in LAMP_BLINK_SHADOW and syncing it into the primary layer for the current blink phase."
Bff_A8552 = "Inline one-byte wrapper for clearing a bit from LAMP_BLINK_SHADOW and the corresponding primary-layer blink state."
Bff_A8561 = "Inline one-byte wrapper for pulsing/toggling a bit in LAMP_BLINK_SHADOW."
Bff_A8570 = "Inline one-byte wrapper for testing a bit in LAMP_BLINK_SHADOW."
Bff_A85a6 = "Inline one-byte score-award frontend. The byte selects an award-value template from the resource behind 0x8204\; the current multiplier at 0x0441 is applied before the packed-BCD value is added to the current player's score."
Bff_A85b3 = "Inline one-byte score-award frontend like Score_AddAwardTemplateInline, but forces multiplier 1."
Bff_A85c0 = "Inline one-byte score multiplier setter. Valid values are 1..10 and are stored in RAM 0x0441 for the next award-template score add."
Bff_A85da = "Inline one-byte wrapper for DisplayScene_StartById_A. Used heavily by mode/game-flow code to request a display scene by compact scene ID."
Bff_A8639 = "Inline command-descriptor launcher. Consumes one command ID byte from the caller, then dispatches CommandDescriptor_QueueOrExecute."
Bff_A8648 = "Inline one-byte frontend for current-player feature-state reads. Consumes slot ID byte and far-calls PlayerFeatureState_ReadByte_B."
Bff_A8658 = "Inline one-byte frontend for current-player feature-state writes. Consumes slot ID byte and far-calls PlayerFeatureState_WriteByte_B_FromA."
Bff_A86a8 = "Hidden 2-byte inline far-call helper. The two bytes after the JSR are a fixed-ROM pointer to a 3-byte far-code descriptor\; the helper loads that descriptor, bank-switches if needed, calls it, restores the previous ROM bank, and returns with the callee condition codes."
Bff_A86b2 = "Shared tail for far-call helpers whose X points at a 3-byte far-code descriptor. Loads FAR_CALL_TARGET_PTR and target bank, then dispatches through the bank-switching tail."
Bff_A86b8 = "Dispatches the already loaded FAR_CALL_TARGET_PTR. If target bank differs from CURRENT_ROM_BANK it writes ASIC_ROM_BANK_LATCH before the call and restores the previous bank afterward."
Bff_A86da = "Same-bank dispatch tail for the loaded far-call target. It skips bank switching and jumps through FAR_CALL_TARGET_PTR."
Bff_A86e2 = "Inline logic-event/logic-variable gate formerly named PostGameEvent_Logic_A_B. Consumes TYPE_LOGIC_EVENT as (ID high byte, payload low byte), reads the clamped current value for that ID, and returns carry/payload comparison status without writing the variable or dispatching a listener table."
Bff_A8700 = "Consumes two inline bytes as a big-endian word and attaches/allocates that DisplayEffect/task ID against the current task context. Attract uses it for manual IDs such as 0x02D0, 0x01A4, 0x0258, and 0x0168."
Bff_A8717 = "Core tail for DisplayEffect_AttachInlineWordId after the inline word has been loaded. Validates that a current task block exists and tail-calls DisplayEffect_AllocateAndAttachTask."
Bff_A87af = "Inline two-byte wrapper for LampEffect_SetWithShadowBit. First byte is lamp/effect ID, second byte is layer selector."
Bff_A87bc = "Inline two-byte wrapper for LampEffect_ClearWithShadowBit. First byte is lamp/effect ID, second byte is layer selector."
Bff_A87c9 = "Inline two-byte wrapper for LampEffect_PulseWithShadowBit. First byte is lamp/effect ID, second byte is layer selector."
Bff_A87d6 = "Inline two-byte wrapper for LampEffect_TestWithShadowBit. First byte is lamp/effect ID, second byte is layer selector."
Bff_A88f7 = "Inline two-byte score frontend. First byte is ScoreAwardTemplateTable ID, second byte is an explicit count\; the count is scaled by current multiplier 0x0441 before the award template is added."
Bff_A8904 = "Inline two-byte score frontend. First byte is ScoreAwardTemplateTable ID, second byte is an explicit count used directly as the award-template multiplier/count."
Bff_A8990 = "Universal WPC Far-Call utility. Consumes a 3-byte far-pointer (Bank, Addr) from the instruction stream."
Bff_A89e3 = "Inline far-code task spawn that inherits selected context from the current task. Allocates at TASK_CURRENT_CURSOR, loads the launch context, then copies task byte +3 and descriptor/context word +0x2D from the current task into the new task."
Bff_A8a1e = "Inline far-code task spawn that inherits selected context from the current task but allocates after the current task or primary queue head. Otherwise matches Task_SpawnInheritedContext_AtCurrentCursorInline."
Bff_A8c2e = "Spawns a task after the current task or primary head without first stopping an existing descriptor match. Consumes 2 descriptor bytes and a far-code pointer."
Bff_A8c4b = "Spawns a new concurrent task. Consumes 2 priority/flag bytes and a far-code pointer."
Bff_A8ccb = "Inline find-or-spawn task helper. Payload is descriptor word plus far-code pointer. It first searches existing tasks with mask 0x01FF\; only if none exists it allocates after the current task or primary head and loads the far launch context. This is the after-current/primary-head counterpart to Task_FindOrSpawnInline."
Bff_A8e95 = "Soft-restart entry that preserves restart/status flags. Sets 0x174C=1, clears main RAM, preserves/consumes 0x1748/0x17A4/0x174A/0x174B control flags, then resets the scheduler."
Bff_A8f24 = "Hold-start restart countdown. Sets 0x174A=2, clears 0x17A4, waits two Delay_5(0x11) windows while pulsing effect 0x20, then calls ENTRY_RESET if the hold completes\; early release falls into soft restart."
Bff_A8f3f = "Restart decision after status/report flows. Reads status-mode code 0x17A6\; code 0 or 0x0C performs a cold ENTRY_RESET, other active codes set 0x174B=1 and use the soft restart path."
Bff_A8f57 = "DisplayEffect row 8 commit gate for the hold-start restart/status path. Runs a status pre-delay, checks status mode and inhibit flag 0x0383, then either detaches or marks the magic soft restart."
Bff_A8f7c = "Commit helper for the status/restart soft path. Optionally notifies the ball-start/runtime layer, sets 0x17A4=1 and magic marker 0x1748=0x1ABC, then jumps to SoftRestart_ReinitPreserveRestartFlags."
Bff_A8f97 = "SWI vector entry. Stock firmware routes SWI directly to the reset entry, so SWI acts as a software reset path rather than a service syscall."
Bff_A8f9a = "FIRQ vector entry. Dispatches through the RAM vectors at 0x0008/0x000A depending on ASIC/status bit 0x3FF8 bit 7. The default handlers clear/acknowledge the FIRQ source and RTI."
Bff_A8fa7 = "Shared panic stub used by invalid interrupt/error paths. Raises panic 0x03 and then falls into the common kernel return-code dispatch path."
Bff_A8fab = "SWI3 vector entry. Raises panic 0x04 and falls through the common kernel return-code dispatch path."
Bff_A8faf = "SWI2 vector entry. Calls the far hook descriptor at 0x8103, then raises panic 0x05 and falls through the common kernel return-code dispatch path."
Bff_A8fb8 = "NMI vector entry. Raises panic 0x06 and falls through the common kernel return-code dispatch path."
Bff_A9046 = "Loads a 3-byte far pointer from X into X/B: word address from +0/+1 and bank byte from +2. Does not bank-switch or dereference the target."
Bff_A904b = "Far-calls the 3-byte descriptor pointed to by X, preserving/restoring the current ROM bank through the shared far-call dispatch tail."
Bff_A9052 = "Far-calls address X in bank B. Stores X into FAR_CALL_TARGET_PTR, uses B as target bank, and restores CURRENT_ROM_BANK after the call when needed."
Bff_A905e = "Far-calls address X in bank A. Stores X into FAR_CALL_TARGET_PTR, uses A as target bank, and restores CURRENT_ROM_BANK after the call when needed."
Bff_A9068 = "Reads one byte from ROM address X in bank B through ROM_ReadByte_X_B, then post-increments X."
Bff_A906d = "Reads one byte from ROM address X in bank B. Temporarily selects B when it differs from CURRENT_ROM_BANK, restores the caller bank, and compares the byte against 1 for caller branch tests."
Bff_A908f = "Reads one word from ROM address X in bank B through ROM_ReadWord_X_B, then advances X by two bytes."
Bff_A9094 = "Reads one word from ROM address X in bank B into Y. Temporarily bank-switches when required and compares the result against 1 for caller branch tests."
Bff_A91a4 = "Enables the checksum-protected RAM/NVRAM write window by writing unlock key 0xB4 to _ASIC_RAM_LOCK. Preserves A."
Bff_A91ad = "Disables the RAM/NVRAM write window by clearing _ASIC_RAM_LOCK to 0. Preserves A."
Bff_A91b6 = "Public A/B-preserving wrapper around CheckFlag_Core. Resolves the selected NVRAM/flag descriptor, validates its checksum range, restores the caller ROM bank, and returns the check result in condition codes."
Bff_A91d3 = "Recomputes the additive complement checksum for NVRAM/block descriptor A and stores it at the descriptor checksum word. Restores the caller ROM bank and preserves A/B/X/Y."
Bff_A91e6 = "Updates the checksum for NVRAM/block descriptor A, then disables the RAM/NVRAM write window through NVRAM_ChecksumBlockA_Disable."
Bff_A91ec = "Resolves NVRAM/block descriptor A. Normal IDs use table 0x8201, high-bit IDs use table 0x81FE with bit 7 cleared. Returns X=block base, Y=payload length, B=target bank, and may switch to that bank."
Bff_A920b = "Computes the additive complement checksum over Y bytes starting at X and compares it with the following stored checksum word. Leaves X at the checksum word, preserves Y, and returns carry set on mismatch."
Bff_A9229 = "For an already selected X/Y checksum range, recomputes the complement checksum with NVRAM_ValidateChecksumRange_XY and stores D at the checksum word. Preserves A/B/X."
Bff_A925f = "Reads logic variable A through the descriptor clamp path, compares the word value against 1, copies the low byte of the value into A, and preserves caller B/Y."
Bff_A926d = "Reads logic variable A through the descriptor clamp path only for condition-code testing against 1. Preserves caller A/Y."
Bff_A9255 = "Reads a descriptor-clamped logic variable into Y and compares it against 1. Used by LogicEvent_TestInline to test whether the previous event/state value was already active."
Bff_A9279 = "Resolves the backing cell for logic variable A, loads its word value, resolves descriptor bounds, clamps Y to [min,max], and restores the caller bank."
Bff_A92a1 = "Writes Y to the selected logic variable. If LOGICVAR_OVERRIDE_ID matches A, updates LOGICVAR_OVERRIDE_CACHE instead of immediate storage."
Bff_A92c1 = "Begins a cached logic-variable override: stores A as LOGICVAR_OVERRIDE_ID and clears LOGICVAR_OVERRIDE_CACHE."
Bff_A92ce = "Ends the cached logic-variable override and returns LOGICVAR_OVERRIDE_CACHE in D."
Bff_A92d5 = "Resolves the descriptor row for the current runtime/mode selector. Selects table 0x8216 or 0x8219 depending on selector range."
Bff_A92f0 = "Selects the two-byte storage cell for logic variable A. Normal IDs are relative to LOGICVAR_MODE_BASE_PTR\; high-bit IDs use global base LOGICVAR_GLOBAL_BASE."
Bff_A9309 = "Initializes LOGICVAR_MODE_BASE_PTR from descriptor tables 0x8216/0x8219 and checks the computed mode-local span against 0x0078."
Bff_A936b = "Tests state bit B in the primary bitset. Normal IDs use base 0x0028\; high IDs 0x80..0x87 remap to 0x00AD. Carry clear means active."
Bff_A9374 = "Tests state bit B in the secondary bitset. Normal IDs use base 0x001F\; high IDs 0x80..0x87 remap to 0x00B1. Carry clear means active."
Bff_A937d = "Shared state-bit tester for normal and high IDs. Invalid high IDs raise panic parameter 0x1F."
Bff_A9396 = "Selects the high-ID secondary bitset base for StateBit_TestInSet_X_B."
Bff_A939b = "Panic path for invalid high state-bit IDs."
Bff_A93a3 = "Tests the selected state-bit byte/mask pair. Carry clear means active\; carry set means inactive."
Bff_A93b5 = "Services the switch/state-bit edge scanner. Compares current and previous primary/secondary bitsets and calls edge handlers when bits change."
Bff_A93c0 = "Runs the state-bit edge scanner when its debounce/holdoff counter 0x0362 is clear. Selects the descriptor bank through the pointer block around 0x81EF/0x81F1."
Bff_A93de = "After the primary sample has stayed stable until timer <0x16>, merges sampled primary bits from <0x15>/<0x14> into the active mask through StateBit_MergePrimaryInputMask."
Bff_A93ec = "Resets the primary debounce sample byte <0x15> to 0xFF when no active primary sample needs delayed merging."
Bff_A93f0 = "Mode gate for the edge scanner. During mode/status 0x09 in 0x17A4 it skips normal edge processing and returns through the service tail."
Bff_A93ff = "Per-byte edge loop over the nine low state-bit mask bytes. X is the byte index 0..8\; masks live in the 0x0031/0x003A/0x0043/0x004C families."
Bff_A941a = "Advances the low state-bit mask-byte loop. After byte 8 it switches to the deferred queue at 0x033E..<0x18>."
Bff_A9426 = "Processes queued delayed state-bit transitions. Each entry is three bytes: state/effect ID at +0 and due time at +1/+2."
Bff_A946c = "Exit tail for StateBit_ServiceEdgeScanner\; runs pending bank-39 deferred handling when 0x0562/0x0564 request it."
Bff_A9476 = "Bridge to the bank-39 cabinet/service deferred handler when 0x0562/0x0564 contain pending service-switch timer events."
Bff_A947d = "Tests a switch/state input ID in A against the current closed-primary snapshot <0x1D>. Valid IDs are 0x09..0x80\; returns carry set for invalid IDs."
Bff_A9489 = "Tests a switch/state input ID in A against the currently open/cleared primary mask derived from <0x14>. Used by cabinet/service deferred handling."
Bff_A949a = "Converts a logical state input ID in A to a single-bit mask using the low three bits of ID-1. IDs <=8 and >=0x81 are rejected with carry set."
Bff_A94b5 = "Merges newly sampled primary-state bits into the primary active mask."
Bff_A94d0 = "Handles a primary-state bit becoming active."
Bff_A94ff = "Handles a primary-state bit becoming inactive."
Bff_A950f = "Primary-inactive bit iterator. For each cleared bit it runs matching delayed queue entries before restoring the primary-active bookkeeping."
Bff_A952f = "Shared iterator over the pending-mask scratch triple: <0x1B> remaining bits, <0x1A> current logical ID, <0x1C> current bit mask."
Bff_A9555 = "Handles a secondary-state bit becoming active. It may queue delayed descriptor work or immediately fire the inactive/descriptor edge path depending on descriptor delay bytes."
Bff_A9570 = "Secondary-active bit loop. Resolves the descriptor row for the current ID, applies descriptor delay/current-state policy, and queues or fires work."
Bff_A95a0 = "Marks the current bit in the deferred/pending mask 0x004C,X and continues scanning the active secondary bits."
Bff_A95aa = "Immediate-fire path for secondary-active descriptors whose selected delay byte is zero."
Bff_A95b2 = "Handles a secondary-state bit becoming inactive. It applies descriptor byte +8 mode flags before entering the common descriptor edge handler."
Bff_A95c2 = "Common secondary-state descriptor edge handler. Uses descriptor byte 8 flags and current owner/bit B to decide whether to toggle state, spawn descriptor work, and/or enter the award-presentation arbitration bridge."
Bff_A95d2 = "Spawns the task described by the current state-bit descriptor, stores owner/context into the task block, then passes descriptor byte 7 and owner B into AwardPresentation_TryArmFromDescriptorFlags."
Bff_A95f4 = "Common descriptor edge commit. Toggles descriptor state at 0x0028,X, restores primary-active bookkeeping, and refreshes the DisplayEffect slot counter when the bit remains active."
Bff_A960f = "Selects the main or extended descriptor table, clamps the requested ID to the table count, and returns Y on the selected descriptor row. Carry set means the ID was clamped to row 0."
Bff_A9632 = "Descriptor spawn gate. Allows task spawning only when the current machine/game mode flags match descriptor byte +8 bits 0x10, 0x20, and 0x08."
Bff_A965b = "Pops the newest delayed state-bit queue entry from <0x18>-3 and copies its three-byte payload into the queue cursor U selected by the caller."
Bff_A966d = "Reads the main/extended DisplayEffect slot counter for ID in B. Main IDs index 0x174E, extended high IDs index 0x1797."
Bff_A9683 = "Updates the main/extended DisplayEffect slot counter for ID in A using descriptor byte 5,Y. Returns carry set when global update lock or invalid ID prevents the update."
Bff_A96a8 = "Classifies DisplayEffect ID in A as main 0x00..0x48 or extended 0x80..0x88 and converts it to a slot index."
Bff_A9be3 = "Returns the current task descriptor word in Y. If there is no current runnable task and TASK_CURRENT_TCB points at the secondary queue head sentinel 0x0371, returns Y=0."
Bff_A9bf8 = "Current-task scheduling helper. Requires a current task, sets task wake time +0x0F to the current tick <0x55>, and sets task flag +0x2C bit 0x80 so later DisplayEffect_AllocateAndAttachTask delays are relative to the previous wake time."
Bff_A9c0a = "Current-task scheduling helper paired with Task_EnableRelativeDelayFromCurrentTick. It sets wake time +0x0F to current tick <0x55> and clears task flag +0x2C bit 0x80 so later attach delays are relative to the current tick."
Bff_A9c1c = "Loads X with TASK_CURRENT_TCB. If the scheduler is at the secondary queue sentinel 0x0371 instead of a real task, reports panic 0x0C and returns X pointing at the zero-filled dummy block at 0x9C2B."
Bff_A9c61 = "System watchdog kick helper. Writes 0x06 to ASIC/watchdog register 0x3FFF and returns. Called from reset/clear paths and once per main service-loop pass."
Bff_A9c75 = "Main fixed-bank service loop. It services display/sound/kernel housekeeping and calls StateBit_ServiceEdgeScanner once per pass."
Bff_A9d8b = "Clears the complete lamp RAM work block starting at 0x02E0, including logical state, overlay masks, overlay data, blink shadow, and extended shadow bytes."
Bff_A9dc6 = "Validates and normalizes A lamp/effect ID plus B layer selector for the Set/Clear/Pulse/Test wrappers. Plain IDs 0x01..0x40 must not use encoded layer 0x48\; encoded IDs 0x41..0x7F clear bit 0x40 and stay on layer 0x48\; encoded IDs 0xC1..0xFF also clear bit 0x80 and switch to layer 0x50."
Bff_A9dfe = "Tests a lamp/effect bit after logical-ID normalization. A is the lamp/effect ID, B is the layer selector. Carry clear means set, carry set means clear."
Bff_A9e68 = "Sets one lamp bit in the selected lamp matrix layer. A is a 1-based logical or physical bit ID, B is the 8-byte layer offset from 0x02E0."
Bff_A9e94 = "Clears one lamp bit in the selected lamp matrix layer. A is a 1-based logical or physical bit ID, B is the 8-byte layer offset from 0x02E0."
Bff_A9ec1 = "Tests one lamp bit in the selected lamp matrix layer using the ASIC bit-address registers. It does not modify the lamp matrix."
Bff_A9ed6 = "Core bit-test tail for LampMatrix_TestBitInLayer. Writes base pointer and bit index to ASIC_BITADDR_PTR/ASIC_BITADDR_MASK, then reads back byte pointer and mask."
Bff_A9eed = "Resets the global blink cadence to 5 service ticks and resumes LampBlink_ServiceTick."
Bff_A9f3b = "Per-pass lamp blink service. When enabled, decrements the blink counter and XORs LAMP_MATRIX_PRIMARY with LAMP_BLINK_SHADOW on the eight lamp rows."
Bff_A9fe3 = "Fills a selected 8-byte lamp layer with 0xFF. Layer selector in B, with special handling for blink/extended shadow layers."
Bff_Aa028 = "Clears a selected 8-byte lamp layer. Layer selector in B, with special handling for blink/extended shadow layers."
Bff_Aa08c = "Rebuilds the primary/background lamp layer from LAMP_MATRIX_LOGICAL and LAMP_BLINK_SHADOW."
Bff_Aa14d = "Clears all display-scene lamp overlay mask layers at 0x02F0, 0x0300, and 0x0310."
Bff_Aa163 = "Copies the logical lamp matrix to overlay0 data and marks overlay0 mask as fully active."
Bff_Aa173 = "Clears all display-scene lamp overlay masks at ball/runtime setup."
Bff_Aa725 = "Initializes the driver-output effect queue and clears/asserts the output descriptor latches according to DriverOutputBitDescriptorTable. This is the setup side of the output-effect scheduler used later by DriverOutputEffect_Trigger_A."
Bff_Aa7ea = "Enqueues an output-effect token into the ring at 0x03F1..0x040C, servicing pending entries if the ring is full. The token counter in 0x03EE is returned in A."
Bff_Aa838 = "Services the pending driver-output effect queue. It advances the consumer pointer 0x03EC, updates active-count bytes 0x03EF/0x03F0, and starts or continues the descriptor selected by the queued token."
Bff_Aa88b = "Starts or advances the current driver-output effect descriptor. It calls the descriptor callback vector, selects the 5-byte output bit descriptor, and updates the active output-effect state bytes."
Bff_Aa8ff = "Selects one 5-byte row in DriverOutputBitDescriptorTable. A is the descriptor index\; return D points at table header + 3 + A*5."
Bff_Aa909 = "Reads a duration/count word from the timing resource table selected through the fixed resource block at 0x81CF."
Bff_Aa918 = "Maps an output-effect logical index A through the fixed resource tables around 0x81D5/0x81DA. Returns the descriptor argument values consumed by DriverOutputEffect_TriggerCore."
Bff_Aa93b = "Public trigger for driver/output bit effects. A selects an output-effect index\; the helper maps it through resource tables and queues/applies the corresponding 5-byte DriverOutputBitDescriptorTable row."
Bff_Aa944 = "Core of DriverOutputEffect_Trigger_A. Checks timing/gating state, selects the driver-output bit descriptor, writes the active-low mask to both shadow and hardware latch targets, and updates the expiry timestamp."
Bff_Aabc6 = "Generic counted-table row selector. X points at a far pointer to a counted table whose header is count word plus row-width byte\; A is a zero-based row index. Returns X at selected row and B as table bank, or panics 0x27 on out-of-range index."
Bff_Aadbe = "Runs a lamp-effect stream with caller-supplied callback in bank A/address Y and mode bits in B. This is the far-callback entry used by game code when the stream operation is not taken from the current DisplayEffect descriptor."
Bff_Aadda = "Async lamp-effect stream task entry. It reruns LampEffectStream_Run with inherited context, then detaches the task."
Bff_Aaddf = "Descriptor-driven lamp-effect stream entry. Reads stream ID and flags from the current DisplayEffect descriptor bytes 0x2D/0x2E, merges caller mode bits, and enters LampEffectStream_Run."
Bff_Aae01 = "Runs a compact lamp-effect stream. The caller supplies a callback such as set, clear, pulse, or test and the stream selects lamp IDs and control opcodes."
Bff_Aae1d = "Synchronous body of LampEffectStream_Run. Initializes the 9-byte stream state on the stack, selects the stream from LampEffectStreamDirectory, positions for forward/reverse traversal, and runs the decoder."
Bff_Aaed3 = "Invokes the current lamp/effect callback for ID A. Depending on the callback setup this sets, clears, pulses, tests, or records the ID\; optional delay accounting is applied after successful callbacks."
Bff_Aaeff = "Selects one entry from the lamp-effect stream directory. It indexes row 4 of CoreFarResourceTable (0x81EC), validates the counted table, reads the ptr16 stream entry, and returns X at the stream start."
Bff_Aaf14 = "Positions X for stream traversal. Forward mode skips the directory pointer/header bytes\; reverse mode loads the stream end pointer and backs up one byte."
Bff_Aaf21 = "Decodes lamp-effect stream opcodes 0x80 and above into handler table entries."
Bff_Aaf41 = "Evaluates a compact conditional block introduced by stream byte 0xF8. It parses condition opcodes 0xFB..0xFF until 0xF9, then optionally recurses into LampEffectStream_RunDirection over the block payload."
Bff_Aaf68 = "Conditional opcode 0xFB: read a ptr16 and compare the following literal byte with the byte at that address."
Bff_Aaf73 = "Conditional opcode 0xFC: read a lamp/effect word and test it through LampEffect_TestWithShadowBit."
Bff_Aaf7c = "Conditional opcode 0xFD: compare the following literal byte with stream-state byte 10,U."
Bff_Aaf84 = "Conditional opcode 0xFE: marks the active/then branch while parsing a 0xF8 conditional block."
Bff_Aaf8c = "Conditional opcode 0xFF: marks the else/inverted branch while parsing a 0xF8 conditional block."
Bff_Aafa4 = "End of conditional opcode parsing at 0xF9. Decides whether to skip the payload or recurse into LampEffectStream_RunDirection for the block."
Bff_Aafd2 = "Primary lamp-effect stream opcode table for bytes 0x80..0x89. Each 3-byte row is argument length followed by a ptr16 handler."
Bff_Aaff0 = "Stream opcode 0x81. Treats the operand as another LampEffectStreamDirectory index and runs that stream in the current direction."
Bff_Aaffc = "Stream opcode 0x82. Unless mode bits 0x04 or 0x01 suppress it, passes the operand to DriverOutputEffect_Trigger_A. This links lamp-effect streams to the driver/output bit-effect scheduler rather than to another lamp stream."
Bff_Ab00d = "Stream opcode 0x83. Uses the operand as a delay/count parameter and falls into the scaled-delay accumulator."
Bff_Ab011 = "Stream opcode 0x80. Adds the current delay base unless mode bit 0x20 is set."
Bff_Ab018 = "Adds stream-state byte 1,U as the current delay base."
Bff_Ab01a = "Scaled delay accumulator. Multiplies the delay byte by stream-state byte 9,U unless that byte is 0xFF, adds it into state byte 2,U, and calls the scheduler delay helper on carry."
Bff_Ab03b = "Stream opcode 0x84. Stores the operand into stream-state byte 1,U, changing the default delay base for later 0x80/0x83 delay opcodes."
Bff_Ab040 = "Stream opcode 0x85. Runs the current callback for an inclusive ID range, honoring forward/reverse traversal."
Bff_Ab069 = "Stream opcode 0x89. Runs the current callback for an inclusive ID range but skips IDs contained in the ptr16 zero-terminated list operand."
Bff_Ab093 = "Helper for opcode 0x89. If ID A is absent from the supplied zero-terminated list, invokes the current lamp/effect callback."
Bff_Ab0a2 = "Stream opcode 0x86. Treats the operand as a ptr16 stream address, positions it for the current direction, and runs it as a nested stream."
Bff_Ab0ab = "Stream opcode 0x87. Calls a far callback using stream-state bytes 10/11 unless mode bit 0x04 suppresses callback execution."
Bff_Ab0ba = "Stream opcode 0x88. Calls a far callback using stream-state byte 10 and operand byte +3 as the bank/selector unless mode bit 0x04 suppresses callback execution."
Bff_Ab109 = "Stores A as player count in RAM 0x17A5."
Bff_Ab10d = "Returns the configured player count from 0x17A5, clamped to 1..4."
Bff_Ab119 = "Returns the current player from 0x040F, clamped to 1..4. Carry set means the stored value was invalid and was forced to player 1."
Bff_Ab12b = "Stores A as current player in RAM 0x040F."
Bff_Ab13f = "Compares configured balls-per-game adjustment 0x81 against BALL_IN_PLAY 0x0410. Returns A=current ball\; carry set means more balls remain, carry clear means current ball is at/over the limit."
Bff_Ab155 = "Preserve-A wrapper around BallCount_TestMoreBallsRemain."
Bff_Ab15b = "Fixed-ROM readiness gate for descriptor 0x200E end-of-ball transition. Carry clear means the bank-38 transition may proceed\; carry set means wait/cleanup, based on <0x8C>, the 0x0416..0x0418 block, and handshake flags 0x0419/0x041A."
Bff_Ab178 = "Sets EOB handshake flag 0x041A to 1\; paired with 0x0419 in EndOfBall_TestTransitionReady."
Bff_Ab181 = "Presentation cleanup wrapper: calls EndOfBall_ResetPresentationIfGateAllows, then detaches the current display/effect task."
Bff_Ab186 = "Conditionally resets end-of-ball presentation state when the fixed-ROM logic/event marker is at least 0x28."
Bff_Ab192 = "If the current fixed-ROM marker is at least 9, clears the 0x0416 presentation block/handshake flags and starts display scene 0x02."
Bff_Ab1a6 = "Clears the 0x0416 presentation/status block via B3D helper, stops attract/display service, then clears EOB handshake flags 0x0419 and 0x041A."
Bff_Ab1bc = "Tests whether EOB/presentation flag 0x0419 is exactly 1, preserving A."
Bff_Ab1c5 = "Main fixed-ROM player/ball advance helper. Consumes pending extra balls from 0x0411 first, otherwise advances CURRENT_PLAYER and wraps/increments BALL_IN_PLAY. Carry clear continues normal next-player/next-ball flow\; carry set selects the bank-38 same-serve/terminal path."
Bff_Ab20c = "State/table descriptor hook for the award-presentation arbitration block. Requires marker >=0x1F, serve/live flag <0x8D clear, and 0x0416 idle\; bit 0x40 forces busy+Task007A, bit 0x80 queues owner B or forces busy on queue overflow."
Bff_Ab23e = "Spawns descriptor 0x007A with AwardPresentation_Task007A_Marker22AndDetach, then emits fixed-ROM marker 0x22 when the spawn succeeds."
Bff_Ab24e = "Descriptor 0x007A one-shot task. Emits fixed-ROM marker 0x22 and detaches through DisplayEffect_DetachAndCleanupTask."
Bff_Ab256 = "Tests whether award-presentation busy flag 0x0416 is exactly 1, preserving A."
Bff_Ab25f = "Reads the award-presentation arbitration block: subtracts 1 from busy flag 0x0416 for condition-code gating, then returns D=queued owner bytes 0x0417/0x0418."
Bff_Ab268 = "If award-presentation block 0x0416 is idle, sets it busy through AwardPresentation_SetBusy_U and spawns descriptor 0x007A."
Bff_Ab27b = "If award-presentation block 0x0416 is idle, queues owner B in 0x0417/0x0418 through AwardPresentation_QueueOwnerBOrSetBusy_U. Only queue overflow forces busy and spawns descriptor 0x007A."
Bff_Ab290 = "Ball-start presentation-state helper. Sets 0x0495/0x0414/0x0415, clears an extra-ball consumed marker if present, raises 0x0419, and may advance scene 0x02 to scene 0x03."
Bff_Ab2be = "If the extra-ball consumed marker 0x0413 is set, clears it and refreshes the Shoot Again lamp/effect from the pending extra-ball count."
Bff_Ab2c9 = "Refreshes the stock Shoot Again lamp/effect. After the lamp gate passes, pending extra balls in 0x0411 turn the effect on\; zero pending extra balls clear it."
Bff_Ab2de = "Ball-start hook that reasserts the Shoot Again blink/shadow effect while the extra-ball consumed marker 0x0413 is still set and the lamp gate passes."
Bff_Ab2ed = "Gate helper for the Shoot Again lamp/effect path, using descriptor pointers at 0x8151/0x8153."
Bff_Ab2fa = "Awards a stock extra ball when adjustment limits and marker 0x25 allow it. Increments pending count 0x0411 and per-ball award count 0x0412, refreshes Shoot Again, then starts award text/presentation."
Bff_Ab323 = "Tests stock extra-ball award limits. Adjustment 0x84 gates per-ball awards against 0x0412\; adjustment 0x83 gates pending extra balls against 0x0411. Carry set means blocked, carry clear means award is allowed."
Bff_Ab341 = "Returns the pending stock extra-ball count from 0x0411 in A."
Bff_Ab345 = "Tests the stock extra-ball consumed marker 0x0413 == 1, preserving A."
Bff_Ab970 = "Score-system startup validator. Resets multiplier 0x0441 to 1, validates the four 6-byte packed-BCD score buffers at 0x1730, and clears all player scores/player count if the buffers or player count are invalid."
Bff_Ab993 = "Clears all four packed-BCD score buffers at 0x1730..0x1747 and resets player count 0x17A5 to 1."
Bff_Ab9a5 = "Validates one 6-byte packed-BCD score buffer. The first five bytes must contain decimal nibbles and the low nibble of the last checked byte must be zero."
Bff_Ab9c8 = "Tests whether the low nibble of A is a valid decimal digit 0..9. Carry clear means valid."
Bff_Ab9d4 = "Copies an award-value template selected by A from the resource table behind 0x8204 into caller buffer X+B, right-aligned up to four bytes and zero-padded for wider buffers."
Bff_Aba0c = "Selects the score-award value resource behind fixed pointer 0x8204 and returns X/Y positioned for a 4-byte packed-BCD award template."
Bff_Aba1a = "Adds score-award template A using the current score multiplier in 0x0441."
Bff_Aba25 = "Scales award-template count by current multiplier 0x0441, bounds the result to a one-byte multiplier, and falls into the common award-template add path."
Bff_Aba3c = "Adds score-award template A once, ignoring 0x0441."
Bff_Aba46 = "Adds score-award template A using explicit multiplier B."
Bff_Aba4e = "Adds an immediate packed-BCD value addressed by A, repeated B times. B is bounded to 1..10\; bank selector 0xFF means the prepared source is already in fixed-bank context."
Bff_Aba6b = "Binds a prepared packed-BCD score source to the current player in 0x040F and calls the core score-add routine."
Bff_Aba79 = "Core score-add gate: verifies scoring is legal, selects the target player's score buffer, adds packed BCD, checks replay thresholds, and raises the ball-start/presentation handshake."
Bff_Aba92 = "Rejects scoring while EOB/serve/global inhibit flags are active, validates player 1..4, and returns U pointing at that player's score buffer."
Bff_Abab6 = "Selects the current player and returns U pointing at that player's 6-byte score buffer."
Bff_Abacc = "Actual packed-BCD score adder. Switches to the source bank, adds the prepared BCD source into the selected player score buffer with DAA, repeats for the requested multiplier, then restores the previous bank."
Bff_Abb21 = "Checks the current player's score against active replay/free-game thresholds at 0x041D, count 0x0425. Per-score-buffer byte +5 stores threshold-hit bits\; reached thresholds call the bank-39 replay award path."
Bff_Abb92 = "Stores score multiplier A in 0x0441. Valid range is 1..10."
Bff_Abbe4 = "Status-mode active test. Compares 0x17A6 against 1 without changing A for the caller\; carry clear means status mode is below active page 1."
Bff_Abbed = "Returns the current status-mode code from 0x17A6."
Bff_Abbf1 = "Returns status-mode switch substate 0x17A7."
Bff_Abbf5 = "Status-mode entry/refresh helper called during initialization and restart bring-up. It either starts the initial status task or refreshes the current status scene depending on the soft-restart flag."
Bff_Abc17 = "Initial status-mode task. Chooses the starting status code/substate, updates persistent status bookkeeping, shows DisplayScene 0x13, then detaches."
Bff_Abc36 = "Status-mode selection loop. Draws the status input prompt, samples the switch-selection table, and stores the selected status code before showing scene 0x13."
Bff_Abc89 = "Finalizes a selected status code: stores it in 0x17A6, updates NVRAM/status bookkeeping, sends the current code to the mechanism side, starts DisplayScene 0x13, and detaches."
Bff_Abca9 = "Refreshes the active status-mode scene, defaulting 0x17A6 to 0x0C when no status code is active."
Bff_Abcc9 = "Sends the active status code to the mechanism/serial-command layer as a 0x79 framed command with the code and its complement."
Bff_Ad6a8 = "Inline far-string draw helper with left/origin alignment. Consumes string address, string bank, and target coordinate word, resolves the far string, draws it, and restores the previous ROM bank."
Bff_Ad6c4 = "Inline far-string draw helper with centered alignment. Consumes string address, string bank, and target coordinate word, resolves the far string, draws it centered through the DMD glyph renderer, and restores the previous ROM bank."
Bff_Ad6df = "Inline far-string draw helper with right alignment. Consumes string address, string bank, and target coordinate word, resolves the far string, draws it right-aligned through the DMD glyph renderer, and restores the previous ROM bank."
Bff_Ad6f8 = "Register-call variant of DMD_DrawFarString_LeftInline. Expects string address/bank/target coordinate already in registers and draws through the shared far-string setup."
Bff_Ad706 = "Register-call variant of DMD_DrawFarString_CenteredInline. Expects string address/bank/target coordinate already in registers and draws centered through the shared far-string setup."
Bff_Ad714 = "Register-call variant of DMD_DrawFarString_RightInline. Expects string address/bank/target coordinate already in registers and draws right-aligned through the shared far-string setup."
Bff_Ad826 = "Per-pass high-ID effect bit service called after StateBit_ServiceEdgeScanner. Walks high IDs, updates secondary event masks and DisplayEffect slot counters, and has special attract/panic handling for IDs 0x82/0x84."
Bff_Ad8ac = "High-ID effect transition handler used by StateBit_ServiceHighIdEffectBits. For IDs 0x84 and 0x82 it promotes attract display channels B/A and emits panic text 0x8052/0x8053 if the expected secondary bit is missing."
Bff_Ad91b = "Wrapper around DisplayEffect_UpdateSlotCounter_A for callers that hold the effect ID in B."
Bff_Ad9e9 = "Default FIRQ RAM-vector target installed by System_ClearVideoRamAndUiState. Clears ASIC/status byte 0x3FF8 and returns from interrupt."
Bff_Ad9ed = "Default FIRQ RAM-vector target installed by System_ClearVideoRamAndUiState. Writes 0xFF to ASIC register 0x3FBD to acknowledge/arm the source and returns from interrupt."
Bff_Ad9f7 = "Main IRQ vector entry. Kicks/marks IRQ activity via 0x3FFF, advances the low tick divider <0x0C> and 16-bit system tick <0x55>/<0x56>, then enters the driver-output, switch/lamp, GI/flasher, and solenoid/mechanism IRQ service chain."
Bff_Ada17 = "IRQ-side driver latch refresh. Every fourth IRQ it writes the shadow bytes in direct page to ASIC driver banks 0x3FE0..0x3FE3 and the special-solenoid latch at 0x3FE6, then continues into switch/lamp/driver service."
Bff_Adab1 = "Applies one timed special-solenoid/output pulse. A selects entry 0..9 from SPECIAL_SOLENOID_BIT_TABLE\; non-zero bits are ORed into the 0x3FE6 shadow/output latch, then cleared according to the zero-cross/timing state."
Bff_Adade = "Common IRQ tail after driver pulse handling. It conditionally scans switches, refreshes one lamp-matrix row, services direct switch timers, and enters the timed/queued driver command service."
Bff_Adb07 = "Composes the active lamp row from primary/background and three mask/data overlay pairs, then strobes ASIC_LAMP_ROW_STROBE and writes ASIC_LAMP_COLUMN_DATA."
Bff_Add47 = "Physical switch scanner. Strobes ASIC_SWITCH_COLUMN_STROBE, reads ASIC_SWITCH_DIRECT and ASIC_SWITCH_MATRIX, stores row snapshots, and updates edge masks consumed by StateBit_ServiceEdgeScanner."
Bff_Ade66 = "IRQ service for two driver paths: a small timed command stream emitted to ASIC_TIMED_DRIVER_CMD and the 16-byte solenoid/mechanism command ring drained through 0x3FC3/0x3FC4."
Bff_Ade76 = "Drains the 0x0461 timed-driver command cursor to ASIC_TIMED_DRIVER_CMD. Entries can be delay bytes or immediate command bytes\; 0xFF advances/wraps the cursor."
Bff_Ade9e = "Solenoid/mechanism queue handshake. Polls ASIC_SOLENOID_QUEUE_STATUS, samples ACK/status bytes from ASIC_SOLENOID_QUEUE_DATA, maintains MECH_CMD_QUEUE_HOLD_LATCH, and decides when queued bytes may be sent."
Bff_Adf30 = "Drains MECH_CMD_RING_BUFFER to ASIC_SOLENOID_QUEUE_DATA when ASIC_SOLENOID_QUEUE_STATUS indicates ready. Handles the 0x11/0x13 hold/release control bytes through MECH_CMD_ACTIVE_BYTE."
Bff_Ae054 = "Writes the complemented GI/output shadow to ASIC_GI_OUTPUT_LATCH, then jumps to the next IRQ service vector."
Bff_Ae05e = "Fliptronic/status IRQ branch entered when the fliptronic monitor latch is enabled. It reads ASIC_FLIPTRONIC_STATUS_CTRL, tracks edge/error timers at 0x054A..0x0550, and eventually resumes the normal IRQ driver refresh."
Bff_Ae122 = "Updates fliptronic/status control bits from the current hardware status and cooldown bytes before the control byte is written back."
Bff_Ae132 = "Stores the computed fliptronic/status control byte in RAM and ASIC_FLIPTRONIC_STATUS_CTRL, then resumes DriverOutput_IRQRefreshLatches."
Bff_Ae2f7 = "DMD page-flip helper. Swaps cached DMD plane A/B selector bytes, writes both hardware plane registers, and makes the previous plane-A value the active visible plane."
Bff_Ae797 = "Initializes GI/flasher hold/blink timers in direct page. Bits 0x20/0x40 use long default timers\; bits 0x01/0x02/0x04/0x08/0x10 use paired hold/blink counters."
Bff_Ae7bb = "Asserts requested GI/flasher outputs from the request mask in <0x22>/<0x14>. Sets bits in the 0x3FE3 shadow/output latch and initializes per-bit hold/blink timers."
Bff_Ae879 = "Services GI/flasher hold and blink timers for the 0x3FE3 latch. Bits are cleared when their hold expires, or blinked/held while the request mask remains active."
Bff_Ae9e0 = "Reads back ASIC_GI_OUTPUT_LATCH, derives active/off/edge masks, folds in display-effect state bytes 0x00B5..0x00B8, and updates the GI/output transition state before the IRQ writes <0xA0> back."
Bff_Aed80 = "Starts a timed pulse on output latch 0x3FE1 bit 0x04 using timer bytes <0xD5>/<0xD6>. Cross-check with solenoid text rows identifies this bit as the Ramp Diverter, not the Thing Knocker."
Bff_Aedc7 = "Dedicated right-flipper switch handler. Starts task descriptor 0x7882 with RightFlipper_SpawnEffect788AWorkerTask, runs several game-mode callbacks, resets the hidden easter sequence, then opens the settings menu task."
Bff_Aef46 = "Shared ball-live wrapper. Tests logic gate 0x1E01 and runs the standard in-play follow-up chain\; the easter/seance phase tick happens later through DisplayEffect ID 0x0C, not here."
Bff_Aef77 = "Plumb-bob tilt switch handler. Runs tilt cleanup callbacks and resets the hidden easter sequence, cancelling any accumulated 0x82/0x84 counts."
Bff_Af09a = "Right-jet switch handler. Reuses BallLive_TestLogicEvent_1E01, sets SEANCE_MODE_ARMED_LATCH, triggers Seance lamp/award follow-up, then returns carry clear."
Bff_Af1ba = "Extended DisplayEffect handler used by descriptor IDs 0x81..0x88. In active play it counts only effect IDs 0x82 and 0x84 for the hidden easter sequence."
Bff_Af1cf = "Active-play branch of SecretInput_ExtendedEffectGateTask. Gates IDs 0x82/0x84, tests the current high state bit, then updates the easter and Seance counters."
Bff_Af1f5 = "Effect-ID 0x84 counting path for the hidden easter sequence."
Bff_Af206 = "Detach tail for the short-lived secret-input DisplayEffect task."
Bff_Af24b = "Raw switch-code dispatcher active during status mode. If 0x17A6 is nonzero and hardware status bit 0x3FDD bit0 is set, it reads raw switch code 0x3FDC and dispatches table entries for 0x43/0x28/0x2A/0x27/0x2B/0x5A."
Bff_Af27c = "Raw switch-code dispatch table for status mode. Entries are triples: raw switch code, big-endian handler pointer."
Bff_Af28e = "Status-mode raw switch 0x43 handler. Calls StatusMode_SetFlag06C6, which sets RAM flag 0x06C6=1."
Bff_Af295 = "Status-mode raw switch 0x2A handler. Runs the shared status-page preparation helper and bank-3B page A."
Bff_Af2a2 = "Status-mode raw switch 0x27 handler. Runs the shared status-page preparation helper and bank-3B page B."
Bff_Af2af = "Status-mode raw switch 0x2B handler. Runs the shared status-page preparation helper and bank-3B page C."
Bff_Af2bc = "Status-mode raw switch 0x28 handler. If the bank-36 condition allows it, runs bank-3B status page 0x66AA."
Bff_Af2cb = "Status-mode raw switch 0x5A handler. Runs bank-32 status page 0x6780."
Bff_A8754 = "Inline DisplayEffect/task ownership helper. Consumes a 16-bit descriptor/effect ID, calls DisplayEffect_FindOrAddById, and detaches the current task if that ID is already owned\; on a newly claimed ID it sets the current descriptor word and returns. Side effects: may allocate/claim a display-effect task, update the current descriptor, or terminate the caller through DisplayEffect_DetachAndCleanupTask."
Bff_A876a = "Inline DisplayEffect stop helper. Consumes a 16-bit descriptor/effect ID, sets it as the current descriptor word, then calls DisplayEffect_StopById_Core. Side effects: current task descriptor is overwritten and matching display/effect tasks are stopped/freed."
Bff_A87e3 = "Inline lamp-effect stream runner. Consumes a 16-bit stream ID and runs that stream through LampEffectStream_SetFromCurrentDescriptor, using the current DisplayEffect descriptor bytes 0x2D/0x2E and LampEffect_SetWithShadowBit as callback. Side effects: lamp/effect bits are set according to the decoded stream\; stream mode bits come from the current task descriptor."
Bff_A87f0 = "Inline lamp-effect stream runner. Consumes a 16-bit stream ID and runs that stream through LampEffectStream_ClearFromCurrentDescriptor with LampEffect_ClearWithShadowBit as callback. Side effects: lamp/effect bits are cleared according to the decoded stream and current descriptor mode bits."
Bff_A8817 = "Mode-0x02 variant of LampEffectStream_SetCurrentDescInline. It consumes a 16-bit stream ID, sets lamp/effect bits via the current DisplayEffect descriptor, and ORs mode bit 0x02 into the stream run."
Bff_A8824 = "Mode-0x02 variant of LampEffectStream_ClearCurrentDescInline. It consumes a 16-bit stream ID, clears lamp/effect bits via the current DisplayEffect descriptor, and ORs mode bit 0x02 into the stream run."
Bff_A884b = "Inline lamp-effect stream runner independent of the current DisplayEffect descriptor. Consumes a 16-bit stream ID, uses LampEffect_SetWithShadowBit as callback, and invokes LampEffectStream_RunCallbackFar_YA with mode 0x04. Side effects: sets lamp/effect bits selected by the stream."
Bff_Aacdf = "Descriptor-driven lamp-effect stream core. D/X selects the stream, callback is LampEffect_SetWithShadowBit, and mode bits are taken from the current task descriptor. Side effects: sets lamp/effect bits according to the decoded stream."
Bff_Aacef = "Descriptor-driven lamp-effect stream core like LampEffectStream_SetFromCurrentDescriptor, but forces mode bit 0x02 before entering LampEffectStream_RunFromCurrentDescriptor."
Bff_Aad00 = "Descriptor-driven lamp-effect stream core. D/X selects the stream, callback is LampEffect_ClearWithShadowBit, and mode bits are taken from the current task descriptor. Side effects: clears lamp/effect bits according to the decoded stream."
Bff_Aad21 = "Descriptor-driven lamp-effect stream core like LampEffectStream_ClearFromCurrentDescriptor, but forces mode bit 0x02 before entering LampEffectStream_RunFromCurrentDescriptor."
Bff_Aad64 = "Lamp-effect stream core independent of the current DisplayEffect descriptor. D/X selects the stream, callback is LampEffect_SetWithShadowBit, fixed bank 0xFF, and mode 0x04 is passed to LampEffectStream_RunCallbackFar_YA."
Bff_A87fd = "Mode-0x01 variant of LampEffectStream_ClearCurrentDescInline. It consumes a 16-bit stream ID, clears lamp/effect bits via the current DisplayEffect descriptor, and ORs mode bit 0x01 into the stream run."
Bff_A880a = "Inline lamp-effect stream pulse runner. Consumes a 16-bit stream ID and runs it through LampEffectStream_PulseFromCurrentDescriptor with LampEffect_PulseWithShadowBit as callback. Side effects: pulses lamp/effect bits according to the decoded stream and current descriptor mode bits."
Bff_A8831 = "Mode-0x03 variant of LampEffectStream_ClearCurrentDescInline. It consumes a 16-bit stream ID, clears lamp/effect bits via the current DisplayEffect descriptor, and ORs mode bits 0x03 into the stream run."
Bff_A883e = "Mode-0x02 variant of LampEffectStream_PulseCurrentDescInline. It consumes a 16-bit stream ID, pulses lamp/effect bits via the current DisplayEffect descriptor, and ORs mode bit 0x02 into the stream run."
Bff_A8858 = "Inline lamp-effect stream runner independent of the current DisplayEffect descriptor. Consumes a 16-bit stream ID, uses LampEffect_ClearWithShadowBit as callback, and invokes LampEffectStream_RunCallbackFar_YA with mode 0x04. Side effects: clears lamp/effect bits selected by the stream."
Bff_Aad10 = "Descriptor-driven lamp-effect stream core like LampEffectStream_ClearFromCurrentDescriptor, but forces mode bit 0x01 before entering LampEffectStream_RunFromCurrentDescriptor."
Bff_Aad32 = "Descriptor-driven lamp-effect stream core like LampEffectStream_ClearFromCurrentDescriptor, but forces mode bits 0x03 before entering LampEffectStream_RunFromCurrentDescriptor."
Bff_Aad43 = "Descriptor-driven lamp-effect stream core. D/X selects the stream, callback is LampEffect_PulseWithShadowBit, and mode bits are taken from the current task descriptor. Side effects: pulses lamp/effect bits according to the decoded stream."
Bff_Aad53 = "Descriptor-driven lamp-effect stream core like LampEffectStream_PulseFromCurrentDescriptor, but forces mode bit 0x02 before entering LampEffectStream_RunFromCurrentDescriptor."
Bff_Aad74 = "Lamp-effect stream core independent of the current DisplayEffect descriptor. D/X selects the stream, callback is LampEffect_ClearWithShadowBit, fixed bank 0xFF, and mode 0x04 is passed to LampEffectStream_RunCallbackFar_YA."
Bff_A888c = "Inline DMD text-field cell-attribute fill. Consumes a field ID in A and attribute/layer byte in B, resolves the field descriptor, then writes B to byte +2 of each 3-byte cell in that field. Side effects: selected DMD field cell attribute bytes are overwritten."
Bff_A8899 = "Inline two-byte DMD display-string frontend. Consumes a DMD text-field/string slot in A and formatter flags in B, then displays STRING_BUFFER through DMD_DisplayStringWithFlags. Side effects: renders text/glyph triplets into the selected DMD field buffer\; B flags affect alignment/source handling."
Bff_A88a6 = "Inline DMD field copy/reflow frontend. Consumes source and destination field IDs and calls DMDField_CopyOrReflow_X0, using zero as the extra reflow/source-offset argument. Side effects: destination DMD field cells are copied, padded, or reflowed from the source field according to destination flags."
Bff_A88b3 = "Inline custom DMD field descriptor update for temporary field IDs 0xFA..0xFF. Consumes field ID and cell count, resolves/allocates the task child slot, and writes the count byte. Side effects: current task child block type 0x0A may be allocated and its slot descriptor modified."
Bff_A88c0 = "Inline custom DMD field descriptor update for temporary field IDs 0xFA..0xFF. Consumes field ID and starting cell offset, resolves/allocates the task child slot, and writes descriptor byte +2. Side effects: current task child block type 0x0A may be allocated and its slot descriptor modified."
Bff_A88cd = "Inline custom DMD field descriptor mode update for temporary field IDs 0xFA..0xFF. Consumes field ID and mode flags, requires at least one of mode bits 0x03, then writes descriptor byte +4. Side effects: may panic 0x40 on invalid mode and may allocate/modify the task child descriptor block."
Bff_A88da = "Inline DMD RAM page-window copy. Consumes a field ID and packed page selector byte\; the field supplies the cell count and offset, the high nibble selects source page, and the low nibble selects destination page. Side effects: copies 3-byte DMD cells between 0x60-byte page regions under 0x0100..LAMP_MATRIX_00_LOGICAL."
Bff_Ab391 = "DMD display-string frontend with explicit flags in B. It uses STRING_BUFFER as input, masks off flag bit 0x10, and renders into the text field selected by A through DMDField_CopyOrReflow internals. Side effects: selected DMD field buffer is rewritten."
Bff_Ab39d = "DMD field copy/reflow core with X forced to zero before entering DMDField_CopyOrReflow. Used by the two-byte inline wrapper when no extra source-offset argument is supplied."
Bff_Ab3a6 = "DMD field copy/reflow core. A selects the source field, B selects the destination field, and X supplies the optional source/reflow offset. Equal-width fields are copied as 3-byte cells\; differing widths are padded/reflowed according to destination mode flags. Side effects: destination DMD field buffer and field cursors are updated."
Bff_Ab6ef = "Custom DMD field descriptor core. For temporary IDs 0xFA..0xFF, resolves/allocates the current task child slot and stores B as the cell count byte."
Bff_Ab6f9 = "Custom DMD field descriptor core. For temporary IDs 0xFA..0xFF, resolves/allocates the current task child slot and stores B as the starting cell offset byte."
Bff_Ab703 = "Custom DMD field descriptor core. For temporary IDs 0xFA..0xFF, resolves/allocates the current task child slot and stores validated mode flags in B\; invalid low mode bits trigger panic 0x40 and force bits 0x03."
Bff_Ab74b = "DMD field cell-attribute fill core. Resolves field A, then writes B into byte +2 for each 3-byte cell covered by that field. Side effects: field attribute/layer bytes are overwritten."
Bff_Ab75d = "DMD RAM page-window copy core. Resolves field A for count/offset, validates the source field pointer is inside DMD RAM, decodes B as source/destination page nibbles, and copies count 3-byte cells from source page to destination page. Side effects: destination page cells are overwritten\; invalid page nibbles panic 0x41."
Bff_A88e7 = "Inline StateBit/Y-gate helper. Consumes a 16-bit inline word into U and calls the bank-3D gate routine using caller B as the StateBit selector and caller Y as the current countdown/cursor value. Side effects: sets/clears gate flag 0x043D, may update Y, and returns carry status from the gate path. Bank 3D selects primary vs secondary StateBit tests from mode byte 0x17A4."
Bff_A8911 = "Inline Mansion script resume helper. Consumes a 16-bit script/resume pointer into Y and calls Mansion_Script_ResumeEntry, preserving X/Y for the caller. Side effects are those of the Mansion script interpreter/resume path."
Bff_A891f = "Inline DMD field animation scheduler setup. Consumes a 16-bit word and stores it into the type-0x06 current-task child block at offset +2, allocating/initializing that block when needed. The field-animation service later uses this word as its base delay/accumulator input."
Bff_A892f = "Inline DMD field animation queue helper. Consumes a 16-bit field ID/config word, allocates a type-0x07 command slot under the current type-0x06 animation block, resolves the DMD field descriptor, and queues opcode bits 0x20 for a forward field-cell transfer. Side effects: command slot is populated, parent slot pointer/count are updated, and the DMD service is marked dirty."
Bff_A893f = "Inline DMD field animation queue helper. Consumes a 16-bit field ID/config word, resolves the field descriptor with end-offset adjustment, and queues opcode bits 0xA0 for the reverse variant of the field-cell transfer. Side effects: command slot and parent animation state are updated."
Bff_A894f = "Inline DMD field animation queue helper. Consumes a 16-bit field ID/config word, forces the optional X/source argument to zero, and queues opcode bits 0x10 for the forward blank/fill-style animation variant. Side effects: command slot and parent animation state are updated."
Bff_A895f = "Inline DMD field animation queue helper. Consumes a 16-bit field ID/config word, forces the optional X/source argument to zero, and queues opcode bits 0x90 for the reverse blank/fill-style animation variant. Side effects: command slot and parent animation state are updated."
Bff_A897f = "Inline display-service wait helper. Consumes a 16-bit tick/count value in D and calls the bank-3A wait/service loop. The loop repeatedly services DisplayEffect_Start(0x01) and display/status update hooks until the count expires or the service gate aborts. Side effects: display/effect service state is advanced\; carry set means the wait was aborted by the gate."
Bff_A8a78 = "Inline formatted-string display helper. Consumes TYPE_FORMATTED_STRING_REF as a 16-bit formatter text reference and TYPE_DMD_TEXT_FIELD_ID as the target field/slot. It passes the text reference in X and caller U as formatter context to Printf_Formatter, then calls DMD_DisplayString with A=target. Side effects: STRING_BUFFER is rewritten by the formatter and the selected DMD field buffer is updated."
Bff_A8a93 = "Inline two-line formatted message helper. Consumes TYPE_FORMATTED_STRING_REF plus TYPE_DMD_TEXT_FIELD_ID, formats and displays the referenced string in the selected field, then formats the next string reference and displays it in the following field ID. Side effects: STRING_BUFFER is rewritten twice and both DMD target fields are updated."
Bff_A8ac6 = "Inline DMD field copy/reflow frontend with explicit source/reflow offset. Consumes source field ID, destination field ID, and an 8-bit offset into X before calling DMDField_CopyOrReflow. Side effects: destination DMD field cells and cursors are updated."
Bff_A8ada = "Inline custom DMD field descriptor update for temporary field IDs 0xFA..0xFF. Consumes field ID and 16-bit buffer pointer, validates the pointer is inside DMD RAM, resolves/allocates the current task child slot, and stores the buffer pointer. Side effects: current task child block type 0x0A may be allocated and its slot descriptor modified."
Bff_A8ae9 = "Inline DMD field animation queue helper. Consumes a string/resource pointer and field/config byte, runs Printf_SetupString, then queues the forward formatted stream variant through the Bank 39 DMD animation scheduler. Side effects: queue slot and parent animation state are updated."
Bff_A8afb = "Inline DMD field animation queue helper. Consumes a string/resource pointer and field/config byte, runs Printf_SetupString, then queues the reverse formatted stream variant through the Bank 39 DMD animation scheduler. Side effects: queue slot and parent animation state are updated."
Bff_A8b0d = "Inline timed formatted-message helper. Consumes a mode byte and TYPE_FORMATTED_STRING_REF, stores the mode in 0x17A4, formats the string into the DMD, displays it in slot 0xA6, refreshes the standard message field, then waits 0x003C ticks through DisplayService_WaitTicksInline. Side effects: 0x17A4, STRING_BUFFER, DMD buffers, and display/effect service state are modified."
Bff_A8b75 = "Inline formatted DMD string helper with explicit display flags. Consumes TYPE_FORMATTED_STRING_REF, TYPE_DMD_TEXT_FIELD_ID, and TYPE_DMD_DISPLAY_FLAGS\; formats through Printf_Formatter and calls DMD_DisplayStringWithFlags. Side effects: STRING_BUFFER and the selected DMD field buffer are rewritten."
Bff_A8b90 = "Inline DMD field animation queue helper. Consumes a stream pointer plus field/config word and queues the forward stream variant through the Bank 39 scheduler. Side effects: command slot and parent animation state are updated."
Bff_A8ba2 = "Inline DMD field animation queue helper. Consumes a stream pointer plus field/config word and queues the reverse stream variant through the Bank 39 scheduler. Side effects: command slot and parent animation state are updated."
Bff_A8bb4 = "Inline DMD field animation queue helper. Consumes explicit source/field parameters and queues the forward blank/fill-style variant through the Bank 39 scheduler. Side effects: command slot and parent animation state are updated."
Bff_A8bc6 = "Inline DMD field animation queue helper. Consumes explicit source/field parameters and queues the reverse blank/fill-style variant through the Bank 39 scheduler. Side effects: command slot and parent animation state are updated."
Bff_A8bd8 = "Inline DisplayEffect delay-task helper. Consumes a DisplayEffect/task ID in Y and delay/count word in D, claims the ID through DisplayEffect_FindOrAddById, and only on a new claim spawns the Bank 3D delay task. Side effects: may allocate/claim a display-effect task and allocate a delay task at the current cursor."
Bff_A8beb = "Inline DisplayEffect delay-task helper. Consumes a DisplayEffect/task ID in Y and delay/count word in D, stops existing matching effects through DisplayEffect_StopById_Core, then spawns the Bank 3D delay task. Side effects: matching effects may be stopped/freed and a delay task is allocated."
Bff_A8bfe = "Inline DisplayEffect delay-task spawner. Consumes a DisplayEffect/task ID in Y and delay/count word in D, then directly spawns the Bank 3D delay task without first claiming or stopping an ID. Side effects: allocates a delay task at the current cursor."
Bff_Ab6de = "Custom DMD field descriptor core. For temporary IDs 0xFA..0xFF, validates caller X as a DMD RAM buffer pointer, resolves/allocates the current task child slot, and stores that pointer as the slot buffer base."
Bff_A8d11 = "Inline full custom DMD field descriptor setter. Consumes temporary field ID, buffer pointer, start cell, cell count, and mode flags, validates the DMD RAM pointer, resolves/allocates the type-0x0A current-task child slot, and writes the complete 5-byte descriptor. Side effects: may allocate/modify the current task custom-field descriptor block\; invalid pointers or modes panic through the shared validators."
Bff_A8d34 = "Inline DMD field blink/reflow helper with zero source offset. Consumes source/destination field IDs, repeat count, and fixed-point wait period, then alternates DMDField_CopyOrReflow with a blank-space fill of the destination field before leaving the copied/reflowed state visible. Side effects: selected DMD fields are rewritten and the current task sleeps/yields between phases."
Bff_A8d46 = "Inline DMD field blink/reflow helper using caller X as the reflow offset and optional Mansion script resume pointer. Consumes source/destination field IDs, repeat count, and fixed-point wait period, then alternates copy/reflow and blank-space phases. Side effects: selected DMD fields are rewritten, the current task sleeps/yields, and nonzero X is resumed through Mansion_Script_ResumeEntry after visible copy phases."
Bff_Ab6b0 = "Full custom DMD field descriptor core. A/B carry cell count and start cell, U carries the temporary field ID, X is the DMD RAM buffer pointer, and Y carries mode flags. It validates the buffer pointer and mode, resolves/allocates the type-0x0A current-task child slot, then writes pointer, start, count, and mode bytes."
Bff_Ab7da = "DMD field blink/reflow core with X forced to zero before entering DMDField_BlinkCopyOrReflow. Used by the simple inline wrapper when no source offset or resume pointer is supplied."
Bff_Ab7e3 = "DMD field blink/reflow core variant that treats caller X as both DMDField_CopyOrReflow's X argument and a nonzero Mansion_Script_ResumeEntry pointer between phases."
Bff_Ab7ed = "DMD field blink/reflow core. D supplies source/destination field IDs, X supplies the DMDField_CopyOrReflow offset, Y is the repeat count, and U is the fixed-point wait period. Each pass copies/reflows, optionally runs a resume hook, waits, blanks the destination field with spaces, waits again, and finally restores the copied/reflowed state."
Bff_Ab83d = "Extended inline DMD field blink/reflow helper. Consumes source/destination field IDs, repeat count, fixed-point wait period, and explicit X/reflow offset before entering DMDField_BlinkCopyOrReflow without a resume hook."
Bff_Ab856 = "Extended inline DMD field blink/reflow helper with resume hook. Consumes source/destination field IDs, repeat count, fixed-point wait period, and explicit X value, then uses that X value as both reflow offset and optional Mansion_Script_ResumeEntry pointer."
Bff_A8f0e = "Soft-restart preserve-flag test. Preserves A while comparing restart flag 0x174C against 1\; carry set means the flag is below 1, carry clear means the soft-restart preserve/refresh path is active. Used by status-mode bring-up and input cleanup paths."
Bff_A8f17 = "Boot/checksum info-word gate. Preserves A/B while testing the 16-bit word at checksum_info_1\; carry set means the word is at least 0x0100 and the normal checksum/status path is present, while carry clear selects the special/no-checksum status handling."
Bff_A8fbc = "Kernel return-code dispatcher used by panic/delay/audit service paths. If stop-hook flag 0x037F is set, temporarily calls the Bank 0x18 stop hook at 0x403F before mapping A to carry/status. Return code 0x24 is normalized to success A=0/carry clear, code 0x11 maps to panic code 0x03/carry set, and other codes return carry set."
Bff_A8ff2 = "Panic-and-detach helper for scheduler/task consistency failures. Raises panic byte 0x69 through Panic_ParamByte, then detaches and cleans up the current display/effect task. Side effects: panic bookkeeping and current task cleanup/free path are executed."
Bff_A8ff9 = "Reset/bring-up helper that clears video/UI runtime RAM. Acknowledges/clears the FIRQ timer source, resets DMD/video state, clears RAM from _ROM_BANK_SHADOW through the main work area, then clears 0x0100..0x02DF and initializes low display pointers before returning."
Bff_A903d = "Generic ROM bank-select helper. If B is nonnegative, writes B to _ROM_BANK_SHADOW and _ASIC_ROM_PAGE\; negative B is treated as current/RAM-local and leaves the bank unchanged. Side effects: current ROM bank/page may change."
Bff_A9022 = "DMD/display dirty service gate. If display state byte 0x0338 is not inhibited by bit 7 and dirty bit 0 is set, calls the Bank 3D refresh worker B3d_A56fa. Side effects: may clear dirty bit 0, redraw/refresh DMD pages, and update display runtime state."
Bff_A9035 = "Fixed bank-select helper for Bank 3D. Loads B with 0x3D and enters BankSwitch_Select_B, updating the ROM bank shadow and ASIC ROM page. Used during reset/soft-restart bring-up before scheduler initialization continues."
Bff_A90ba = "Bank-aware ROM/RAM copy helper. Copies A bytes from X to Y\; if B is a positive bank different from the current ROM bank it temporarily selects B, performs Mem_CopyBlock_X_To_Y_CountA, then restores the previous bank. Negative B and current-bank copies avoid the temporary bank switch. Side effects: destination memory at Y is overwritten and ROM bank shadow/ASIC page may change transiently."
Bff_A90e2 = "Tokenized DMD string segment-length wrapper. Preserves caller X while measuring the current segment of the banked string at X/B through DMDString_MeasureTokenizedSegmentLen. Returns the measured display-cell count in A."
Bff_A90e8 = "Tokenized DMD string segment-length scanner. Temporarily selects string bank B, scans from X until NUL or a segment separator, treats '\#' numeric placeholders through the shared formatter helper, counts display cells in A, advances X, and restores the previous ROM bank. Malformed empty or '\#' separator states panic with byte 0x3C."
Bff_A9128 = "Tokenized DMD string segment advancer. Temporarily selects string bank B and advances X across one tokenized display segment plus following ',', '.', or ':' separators. Carry clear means another segment remains at X\; carry set means NUL/end-of-string was reached. Restores A/B/Y and the previous ROM bank."
Bff_A9162 = "Begins a cached logic-variable override with override ID 0 while preserving A. Side effects: clears LOGICVAR_OVERRIDE_CACHE and stores zero in LOGICVAR_OVERRIDE_ID via LogicVar_BeginCachedOverride."
Bff_A916a = "Reset-time RAM-lock-size initializer for the 0x1800 RAM limit. Looks up the 0x1800 entry in the fixed RAM-lock table and writes its lock-size byte through ASIC_RAMLockSize_WriteA. Panics with byte 0x02 if the sentinel is reached first\; preserves A/X/Y."
Bff_A9188 = "Writes A to the ASIC RAM lock-size register using the NVRAM/RAM unlock sequence. Side effects: briefly writes the RAM-lock enable key, updates _ASIC_RAM_LOCKSIZE, then disables the lock key again."
Bff_A9231 = "Copies a default/source block from U into NVRAM/RAM block descriptor A. Resolves the descriptor, requires a RAM-local negative descriptor bank and panics with byte 0x20 otherwise, restores the caller's previous ROM bank, then copies descriptor length Y bytes from U to target X. Zero-length descriptors are no-ops."
Bff_A9334 = "Initializes the low StateBit/switch runtime buffers. Disables IRQ during the reset, clears 0x41 bytes at 0x0014, kicks the watchdog, calls the Bank 3D companion initializer, then seeds low-RAM state pointers and mode byte 0x0362. Preserves CC/A/X/Y."
Bff_A935a = "Tests whether any byte in the nine-byte secondary/unknown switch buffer is nonzero. Returns carry set if any secondary bit is active and carry clear if the buffer is all zero\; preserves A/B/X."
Bff_A83e5 = "Inline one-byte memory-copy wrapper. Consumes a count byte, copies that many bytes from caller X to caller Y through Mem_CopyBlock_X_To_Y_CountA, and preserves A/U plus X/Y via the callee. Side effects: destination memory at Y is overwritten."
Bff_A83f2 = "Inline one-byte memory-clear wrapper. Consumes a count byte and clears that many bytes at caller Y through Mem_ClearBlock_Y_CountA. Side effects: destination memory at Y is zeroed."
Bff_A83ff = "Inline one-byte memory-fill wrapper. Consumes a count byte and fills caller Y with the caller's B value through Mem_FillBlock_Y_CountA_ValueB. Side effects: destination memory at Y is overwritten with B."
Bff_A8419 = "Inline one-byte driver/output effect trigger. Consumes an effect token byte, calls DriverOutputEffect_Trigger_A, and preserves A/X for the caller. Side effects are those of the driver-output effect layer: queued or immediate output pulses/latch changes depending on the descriptor."
Bff_A8599 = "Inline one-byte DMD display-string wrapper. Consumes the target/string slot byte into A, calls DMD_DisplayString, and preserves A/X. Side effects: writes text/glyph data into the active DMD drawing buffer according to the current DMD text state."
Bff_A8a59 = "Inline copy helper using caller X as source and an inline 16-bit destination plus count byte. Copies count bytes from X to the inline destination address through Mem_CopyBlock_X_To_Y_CountA. Side effects: destination memory is overwritten."
Bff_A8a69 = "Inline copy helper using an inline 16-bit source plus count byte and caller Y as destination. Copies count bytes from inline source X to Y through Mem_CopyBlock_X_To_Y_CountA. Side effects: destination memory is overwritten."
Bff_A8b55 = "Inline memset-zero helper. Consumes destination pointer Y and 16-bit length D from the instruction stream, then clears that many bytes through Mem_ClearBlock_Y_CountD. Side effects: destination RAM is zeroed\; length zero is a no-op."
Bff_A8b65 = "Inline memset helper. Consumes destination pointer Y and a packed word where A=count and B=fill byte, then fills count bytes through Mem_FillBlock_Y_CountA_ValueB. Side effects: destination RAM is overwritten with B."
Bff_A8cff = "Inline memcpy helper. Consumes source pointer X, destination pointer Y, and count byte A from the instruction stream, then copies through Mem_CopyBlock_X_To_Y_CountA. Side effects: destination RAM is overwritten by source bytes."
Bff_Aa608 = "Core RAM copy loop. Copies A bytes from X to Y, preserving A/B/X/Y for the caller. Side effects: writes to destination range Y..Y+A-1."
Bff_Aa613 = "Core RAM clear loop. Clears A bytes at Y with zero and preserves A/B/Y. Side effects: writes zeros to destination range\; A=0 returns without writing."
Bff_Aa620 = "Core RAM clear loop with 16-bit length in D and destination Y. Clears D bytes unless length is zero. Side effects: writes zeros to destination range\; preserves B/X/Y."
Bff_Aa632 = "Core RAM fill loop. Writes B into A bytes at Y and preserves A/Y. Side effects: overwrites destination range Y..Y+A-1."
Bff_A9f76 = "Lamp/effect helper. A selects the encoded lamp/effect, sets layer 0x00, clears layer 0x40, and preserves B. Side effects: updates the lamp/effect shadow/logical layer state."
Bff_A9f84 = "Lamp/effect helper. A selects the encoded lamp/effect and clears both layer 0x00 and layer 0x40 while preserving B. Side effects: updates the lamp/effect shadow/logical layer state."
Bff_Aa225 = "Pricing/profile override setter. Stores A in override/profile byte 0x17A0, then rebuilds the derived profile bytes at 0x03C8..0x03CC from the jumper/override table."
Bff_Aa4ea = "Unsigned multi-byte division wrapper with rounded quotient adjustment. A is the byte count, X points at the dividend, Y at the divisor, and U at the quotient/work buffer. Side effects: quotient/remainder work buffers are rewritten and carry reflects the divide helper path."
Bff_Aa54d = "Five-byte packed/integer multiply-accumulate helper. Uses A as a byte multiplier, X as the destination/result buffer, and Y as the source/work selector. Side effects: rewrites the five-byte destination with the accumulated product and carries."
Bff_Aa65a = "Random half-probability condition helper. Calls Random_NextByte_A, adds 0x80 for carry/condition-code testing, and restores caller A. Callers use BHS/BLO as a random 50 percent gate."
Bff_Aa799 = "Clears the ball-tilted latch <_BALLTILTED>. Side effects: subsequent ball/playfield logic no longer sees the current ball as tilted."
Bff_Aa7e4 = "A-preserving driver-output effect queue wrapper. Enqueues token A through the output-effect layer and restores A before returning. Side effects: output-effect queue/state may advance."
Bff_Aaa88 = "GI inhibit-mask clear helper. Clears the bits selected by A from RAM 0x03D5, reapplies the GI/relay state, and preserves A. Side effects: selected GI channels are re-enabled/uninhibited."
Bff_Aaaa6 = "GI brightness setter. A is a low-five GI mask and B is the brightness/control byte written to matching GI brightness slots, followed by a GI/relay state reapply."
Bff_Aab05 = "Relay/triac set helper. ORs mask A into the relay/triac shadow and writes the hardware latch, preserving A. Side effects: selected relay/triac outputs are forced on."
Bff_Aab1c = "Clears pending timed relay/triac masks selected by A from the relay/triac timer table. Side effects: matching timed pulse state is cancelled or masked out."
Bff_Ab5c6 = "DMD tokenized-string hash escape parser. Parses a \# token and up to four hex digits from X, returns the mapped glyph/control word in Y, and stores the advanced source pointer. Malformed tokens panic 0x10 and return Y=0xFFFF with carry set."
Bff_Abf36 = "Default sound command sender. Sends the command word referenced through table pointer 0x8166 with flags 0x0004, then clears lamp/sound effect latch 0x0447."
Bff_Abf6f = "Forced lamp/sound FX trigger. Sends sound command D with flags 0x0004 and stores A into latch 0x0447 without the duplicate suppression used by LampFX_Trigger."
Bff_Abfdb = "Sound-card data poll helper. If status bit 0 indicates data, reads the sound-card data latch, stores non-0xFF bytes at 0x0444, and returns condition codes from the availability/result path."
Bff_Ac027 = "Sound-card output FIFO byte queue. Queues A into the sound-card ring buffer and writes a second 0xFF when A is 0xFF, implementing the escaped-FF stream convention. Side effects: ring buffer indices/flags are updated."
Bff_Ac736 = "Display-scene attach/merge failure return. Sets carry, discards the local status byte on the stack, and restores registers for the caller. Used as a shared error/blocked exit from scene attach logic."
Bff_Ad4f5 = "DMD graphic/glyph range selector. A is the target index and X points at a range table. It scans the table, computes the selected range offset in B, advances X past the table, and updates DMD scratch bytes."
Bff_Ad754 = "DMD glyph/graphic table selector. Stores table selector B in DMD scratch byte <0x98 and enters the fixed-bank table-selection path for the current ROM bank."
Bff_Ae1b3 = "Carry-clear hook/stub preserving A. Clears carry and returns, allowing callsites to branch through a patchable success hook while keeping A intact."
Bff_Aed47 = "RTI-time ramp-diverter pulse timer. Services the diverter pulse countdown bytes <0xD4..0xD6 and toggles high-power solenoid enable bit 0x04 from the command shadow when the pulse window changes."
Bff_Af35e = "Centered DMD graphic-string draw helper. Sets up the graphic string, measures/centers it, draws each graphic frame byte from the string, then restores the previous ROM bank."
Bff_Af36d = "DMD graphic-string renderer. Walks the NUL-terminated graphic-frame byte string at Y and draws each frame through DMD_GraphicBlit_DrawFrameCore. Side effects: DMD graphic buffer is modified."
Bff_Af38c = "DMD graphic-string setup. Initializes scratch coordinates from A/Y, optionally formats a string when X is nonzero, selects the bank-specific graphics table from B, and leaves Y pointing at STRING_BUFFER."
Bff_Afb39 = "Inline bank-3B tracked lamp-effect stream frontend. Consumes the two inline stream bytes and runs mode 0x0E through the tracked set/clear callback. Side effects: lamp/effect stream state and shadow bits may change."
Bff_Afb6f = "Inline bank-3B lamp-effect clear frontend. Consumes the two inline stream bytes and runs mode 0x04 through the callback that clears active tracked lamp/effect state."
Bff_A846f = "Inline one-byte GI off helper. Consumes a GI mask byte, writes brightness/control value 0x81 to matching GI brightness slots, and reapplies the GI/relay state."
Bff_A8629 = "Inline DMD field-animation child service wrapper. Consumes one inline byte, stores it into the current task animation child block, sets service mode 0x20, and runs the bank-39 field-animation service."
Bff_A9864 = "Scheduler sleep core entry after the tick count has already been stored in <0x62. Clears <__TIME_NEXT_MINUTE> and falls into the context-save/yield path."
Bff_A8f96 = "No-op callback stub. Returns immediately with RTS and is used by descriptor/callback tables when no action is required. Side effects: none beyond returning with caller condition codes/registers unchanged."
Bff_A91bc = "Core CheckFlag implementation. Resolves the checksum-protected NVRAM/flag descriptor, validates its checksum range, restores the caller ROM bank, and returns the flag/check result in condition codes while preserving caller A/B/X/Y."
Bff_A9866 = "Scheduler sleep/yield continuation. Saves the current task context after the tick count is already staged, validates the scheduler work pointer, and enters the context-save/yield path. Panics 0x71 on an invalid task/work pointer."
Bff_A9d5c = "Lamp/driver runtime reset used during ball/start transitions. Validates the core resource table, clears all lamp matrix buffers, restarts lamp blinking, clears runtime byte 0x73, and seeds the relay/triac shadow to 2 or 3 depending on logic event 0x9E04."
Bff_A9f6d = "Lamp/effect convenience wrapper. Uses A as the logical lamp/effect ID, forces layer selector B=0x00, and calls LampEffect_PulseWithShadowBit. Preserves B\; side effects are lamp/effect shadow and logical lamp pulse state updates."
Bff_Aa1d9 = "Rebuilds derived pricing/profile bytes. Chooses the active profile source from override byte 0x17A0 when valid or MPU jumpers otherwise, stores masked profile bits at 0x03C8, and copies the selected four-byte profile row into 0x03C9..0x03CC."
Bff_Aa308 = "Formats/resolves the caller string resource through Printf_SetupString and copies the resulting banked NUL-terminated string into STRING_BUFFER with a 0x2B-byte cap, restoring the previous ROM bank afterward."
Bff_Aa384 = "Pricing/profile helper that tests derived jumper/profile byte 0x03C9 against threshold 4 while preserving A. Callers use the returned condition codes to select profile-specific behavior."
Bff_Aa38f = "Pricing/profile helper that tests derived jumper/profile byte 0x03C9 against threshold 1 while preserving A. Callers use the returned condition codes to select profile-specific behavior."
Bff_Aa39a = "Pricing/profile helper that tests derived jumper/profile byte 0x03C9 against threshold 5 while preserving A. Callers use the returned condition codes to select profile-specific behavior."
Bff_Aa517 = "Unsigned multi-byte compare helper. Compares A bytes at X and Y in order, preserves A/B/X/Y, and returns condition codes from the first differing byte or equality of the full span."
Bff_Aa662 = "Random percent gate. Treats caller A as a 0..100 threshold, draws Random_ScaledA(100), preserves caller A, and returns carry clear when the random value is below the threshold, carry set otherwise."
Bff_Aaa96 = "GI mask-on helper. Writes brightness/control byte 0x80 to the GI_BRIGHTNESS entries selected by low-five mask A, then reapplies GI/relay state. Preserves B\; side effects include GI brightness and relay/triac latch updates."
Bff_Aab9a = "Relay/triac fixed-mask helper. Sets relay/triac mask bit 0x20 through RelayTriac_SetMask_A while preserving A. Side effects: bit 0x20 is ORed into the relay/triac shadow and hardware latch."
Bff_Ab411 = "Default-flag DMD string display wrapper. Clears B and calls DMD_DisplayStringWithFlags_X with source pointer X and field ID A. Side effects are the selected DMD field writes performed by the display core."
Bff_Ab5b4 = "Bank-restoring DMD hash-token parser wrapper. Temporarily selects the caller string bank, calls DMDString_ParseHashHexToken_X, restores the previous ROM bank, and preserves parser condition codes plus caller A/B."
Bff_Ab6d1 = "Custom DMD field mode-flag store. Requires one of low mode bits 0x03 in B, panics 0x40 and forces those bits when invalid, then stores B at descriptor byte +4 for the slot pointed to by X."
Bff_Ab70d = "Custom DMD field slot resolver/allocator. Accepts temporary field IDs 0xFA..0xFF in A, finds or allocates the current task child block type 0x0A, initializes six five-byte slots when allocated, and returns X at the selected slot with carry clear."
Bff_Ab7c9 = "DMD RAM pointer validator for custom field buffers/pages. Requires X to be in the DMD RAM window 0x0100..LAMP_MATRIX_00_LOGICAL-1\; invalid pointers panic 0x2B and return carry set."
Bff_Abf47 = "Zero/default sound command sender. Sends command word Y=0 with flags D=0 through the gated sound-command path, then clears lamp/sound effect latch 0x0447."
Bff_Abfb6 = "Ungated default-flags sound command writer. Calls the raw sound-card command writer with command word Y and flags D=0, bypassing the status-mode hook/gate used by Sound_SendCommandY_DefaultFlags."
Bff_Abffe = "Sound-card wait/poll helper. Uses A as a retry count, repeatedly starts DisplayEffect 0x04 and polls sound-card data into 0x0444 until data is available or the count expires. Carry clear means data arrived\; carry set means timeout."
Bff_Ad241 = "Clears/reinitializes DMD page memory during system video reset. Runs the DMD/video setup helper, clears both DMD pages at 0x3800 and 0x3A00 through DMD_ClearPage_U, and kicks the watchdog between pages."
Bff_Ad280 = "Clears a full 0x200-byte DMD page whose base is in U by pushing zeroed register groups backwards over the page. Preserves caller registers\; destination page memory is overwritten with zeros."
Bff_Ad2e3 = "DMD row-copy core. Copies B groups of 16 bytes from source U to destination Y using wide register transfers. Used for full-page copies with B=0x20 and status-area copies with smaller counts."
Bff_Ad560 = "Right-aligned glyph-string renderer for the current banked/far-string context. Measures each segment, adjusts 0x0545 so the segment ends at the requested x-coordinate, draws through DMD_DrawGlyphString_Y, and follows embedded bank/font changes."
Bff_Ad59d = "Left/origin-aligned glyph-string renderer for the current banked/far-string context. Draws each segment at the current 0x0545 coordinate through DMD_DrawGlyphString_Y and follows embedded bank/font changes."
Bff_Ad722 = "Shared far-string setup for DMD_DrawFarString_* wrappers. Stores target coordinate Y in 0x0545, optionally formats the string when X is nonzero, selects string bank B, points Y at STRING_BUFFER, and returns the previous ROM bank in A for restoration."
Bff_Ae472 = "Indexed DMD full-frame/table draw core. With X pointing at a far-frame table and B as row index, resolves the far frame pointer, bank-switches to the asset, draws through the frame decoder, then restores the previous ROM bank and caller registers."
Bff_Afb81 = "Inline bank-3B lamp-effect stream clear frontend. Consumes the two inline stream selector bytes into D/X and runs mode 0x06 through the bank-3B tracked-clear callback. Side effects: clears/tracks active lamp/effect state according to the decoded stream."
Bff_Aa5f6 = "Packed-BCD two-byte add helper. Treats caller D as a two-byte packed BCD addend and caller Y as the two-byte packed BCD accumulator saved on the stack, performs DAA-adjusted low/high byte addition, and returns the updated value in Y while preserving A/B."
Bff_A9abd = "Checked task-block free helper. Requires U to point at a task/block record, panics 0x09 on null, rejects protected type 0x08 with panic 0x33, then links the block back to FREE_BLOCKS through Task_FreeBlock."
Bff_Ad5f4 = "Measures a glyph/token string at Y for the current DMD glyph table. Accumulates glyph widths and inter-character spacing until NUL or newline, subtracts the final spacing, and returns the measured width in A while preserving Y."
Bff_Af056 = "GREED G lamp one-shot helper. If encoded lamp 0xD1 is not already set, sets it and triggers lamp/sound FX 0x0D. Preserves A/B\; repeated calls do not retrigger the effect while the lamp is already set."
Bff_Aa6e7 = "Sorts a word table at X in ascending order. B is the word count\; the routine bubble-sorts adjacent 16-bit entries in place and preserves caller A."
Bff_Aa6ee = "Sorts a word table at X in descending order. B is the word count\; the routine bubble-sorts adjacent 16-bit entries in place and preserves caller A."
Bff_Aaaa9 = "Core GI brightness/mode writer. A supplies the low-five GI mask and B the brightness/control byte\; selected GI_BRIGHTNESS entries are updated, then the relay/triac GI state is reapplied."
Bff_Abbda = "IRQ-safe sound/status input reset helper. Temporarily masks IRQ, clears low-RAM sound/status byte 0x91 and _IO_BUFFER_TAIL_INDEX, then restores caller condition codes."
Bff_Abfbf = "Raw sound command writer. Stores command word Y, flags/background bytes D into 0x0442/0x0446/_BACKGROUND_MUSIC_PLAYING and queues the bytes to the sound card, including the optional table byte when flag bit 0x02 is set."
Bff_Acb3d = "Shared command-descriptor execution core for immediate and queued commands. Resolves descriptor A, applies mode/game-state gates, launches descriptor tasks/display scenes when allowed, and queues or removes command records as needed."
Bff_Ada5c = "IRQ solenoid phase scheduler tail. Advances the high-power solenoid phase counter, dispatches timed special-solenoid pulses or flashers, and falls into the shared switch/lamp/driver IRQ service tail."
Bff_Adf60 = "Active low-power solenoid queue IRQ service. When low-power solenoid output is enabled, advances queued serial/solenoid state, drains pending command words, updates ASIC ROM-page based descriptor masks, and continues into the IRQ hardware-output path."
Bff_Ae1b9 = "DMD video reset helper. Disables DMD FIRQ scanline by writing 0xFF, selects default draw planes, and makes cached plane B active while preserving caller A."
Bff_A96d2 = "Scheduler/thread allocator initializer. Clears thread heads, initializes scheduler state bytes, builds the free block list from FREE_RAM up to 0x1600, stores free counts, and points THREADS/__SLEEP_TMP at THREADLIST_NUL."
Bff_A9ae0 = "Task stop wrapper using zero mask/id arguments. Preserves A/B, loads D=0, and calls Task_StopByIdMasked to stop matching task/display-effect records according to the core mask semantics."
Bff_A9d98 = "Ball-start mini-state clear helper. Clears four bytes at 0x0330..0x0333 through Mem_ClearBlockInline and returns."
Bff_A9fd1 = "Lamp/effect layer-0x40 test wrapper. Uses A as the encoded lamp/effect ID, forces layer selector B=0x40, calls LampEffect_TestWithShadowBit, and preserves B while returning the test condition codes."
Bff_Aa067 = "Lamp matrix layer fill helper. Validates layer selector B, fills the selected eight-byte lamp layer with pattern A, and rebuilds the primary/blink-derived layer when the affected selector is layer 0x00 or 0x40. Invalid selectors panic 0x1D."
Bff_Aa0ab = "Restores per-player lamp/blink snapshot data from the player record at X. Replays saved layer 0x40 and 0x00 bits through lamp-effect setters, then copies saved blink/primary shadow bytes back into the fixed lamp RAM mirrors."
Bff_Aa101 = "Saves current lamp/blink state into the player record at X. Captures layer 0x00 and 0x40 effect bits plus the fixed blink/primary shadow byte ranges into the per-player snapshot area."
Bff_Aa21d = "Returns derived pricing/profile byte 0x03CC in A."
Bff_Aa221 = "Returns the current pricing/profile override byte 0x17A0 in A."
Bff_Aa22c = "Persists the active derived pricing/profile selector. Enables checksum-protected NVRAM block A, copies 0x03C8 to 0x1C10, then disables the block again."
Bff_Aa23c = "Compares the active derived pricing/profile selector at 0x03C8 against saved NVRAM mirror 0x1C10 while preserving A\; callers use the returned condition codes for changed-profile tests."
Bff_Aa330 = "Returns derived pricing/profile code byte 0x03C9 in A."
Bff_Aa334 = "Tests whether derived pricing/profile code 0x03C9 is one of the accepted values 1 or 3. Carry clear means accepted\; carry set means all other codes."
Bff_Aa349 = "Tests pricing/profile flag byte 0x03CB bit 0 while preserving A. Returns condition codes from comparing the masked bit against 1."
Bff_Aa354 = "Tests pricing/profile flag byte 0x03CB bit 1 while preserving A. Returns condition codes from comparing the masked bit against 1."
Bff_Aa35f = "Tests pricing/profile flag byte 0x03CB bit 2 while preserving A. Returns condition codes from comparing the masked bit against 1."
Bff_Aa63b = "Mixes the ASIC clock hour/minute registers into the random seed bytes 0x17A1..0x17A3 while preserving caller A. Used to perturb the pseudo-random state from live time."

B2f_A4be0 = "Shared gate used by several settings-entry callbacks. Rejects while selected display scenes/effects or blocked mode IDs are active; returns carry clear only when mode/status presentation is idle enough for the callback side effect."
B2f_A4c3c = "Entry-specific settings callback from descriptor row 1 at B3b:5A1E. Dispatches callback opcodes including 0x02, 0x01, 0x16, and 0x03 into Thing Multiball/end-of-ball/vault-result reconciliation paths, using Settings_LoadPersistentWindowBaseIndex and current settings value tests as gates."
B2f_A4d41 = "Entry-specific settings callback from descriptor row 2 at B3b:5A29. Dispatches opcodes 0x10, 0x15, 0x12, 0x0F, and 0x14 into mansion/GREED/Thing-related award and relight paths, with presentation-idle gates and BigMultiball_StartIfGreedQualified as a possible side effect."
B2f_A4e32 = "Entry-specific settings callback from descriptor row 3 at B3b:5A34. Dispatches opcode 0x07 to Bear Kick/Cousin-It/GREED setup and opcode 0x0D to a gated command/display path; side effects include award presentation, command 0x0A, DisplayEffect work, and lamp/mode refresh through bank 36."
B2f_A4fbf = "Entry-specific settings callback from descriptor row 4 at B3b:5A3E. Dispatches opcode 0x07 to GREED/Vault/Thing Multiball setup and opcode 0x0D to the paired command/display path; side effects include command 0x0B, jackpot/Thing Multiball checks, task 0x80E8, and lamp refresh."
B2f_A5071 = "Entry-specific settings callback from descriptor row 5 at B3b:5A48. Dispatches opcodes 0x10, 0x11, 0x15, 0x0F, and 0x13 through Swamp/Thing/Jackpot progress paths; can update settings row 5 visible/current value, start Thing Multiball, set Swamp/Grave lamps, stop effects 0x00AA/0x00C6, and refresh lamps/modes."
B2f_A51f0 = "Entry-specific settings callback from descriptor row 6 at B3b:5A53. Opcode 0x07 starts task 0x00C7 at B34_A6504; other opcodes return without side effects."

B3b_A7377 = "Initializes the operator/settings menu model. Loads counted root table Settings_MenuRootTable at B3b:5A09, stores the page count at 0x0734, allocates five scratch bytes per entry from FREE_RAM into 0x0732, clears the scratch rows, recomputes the visible limit 0x0736, and repairs/loads the persisted window-base index from 0x1EF6/0x1EF7."
B3b_A76a4 = "Resolves a settings entry by zero-based index A. Returns Y at the five-byte RAM scratch row and U at the ROM page/entry descriptor selected from Settings_MenuRootTable; B remains the descriptor bank. Panics 0x47 on out-of-range indexes."
B3b_A76cb = "Returns Y at the five-byte RAM scratch row for settings entry index A. The row layout observed so far is byte 0 dirty/pending display value, byte 1 committed/current value mirror, byte 2 visible cursor value, byte 3 flags, byte 4 upper/window/current target used by type 3/4 paths."
B3b_A76e2 = "Entry-specific settings callback dispatcher. For current entry A, resolves its ROM descriptor, reads the far-code pointer at descriptor bytes +1/+2 plus bank byte +3, then far-calls it with caller A and the inline callback opcode in B. This is the bridge used by Settings_InvokeEntryCallbackInline; storage/persistence side effects are handler-specific."
B3b_A7741 = "Reads a stable window-base/menu value by repeatedly sampling the descriptor statebit list until it remains stable across short DisplayEffect ticks, then normalizes it through the descriptor polarity scan."
B3b_A7739 = "Variant of Settings_ReadStableWindowBaseIndex that requests the current-value interpretation instead of the window-base interpretation before normalizing through the same descriptor scan."
B3b_A778c = "Starts adjustment of the currently selected settings entry. Invokes callback opcode 0x16, runs the visible adjustment/scroll reconciliation worker, then returns to the menu frame runner."
B3b_A7bd0 = "Stores a newly sampled stable window-base value into scratch byte +4, refreshes display state, and invokes callback opcode 0x24 when that byte changes."
B3b_A7bdb = "Stores a newly sampled stable current value into scratch byte +4, refreshes display state, and invokes callback opcode 0x24 when that byte changes."
B3b_A7be6 = "Shared store-and-refresh helper for type 3/4 settings. Updates scratch byte +4, clears/uses flag bit 0 as a settled marker, and invokes callback opcode 0x24 on changes."
B3b_A7c3a = "Recomputes the highest selectable/visible settings value at 0x0736 by walking the statebit list referenced by the first settings descriptor until ROM_ReadByteAndAdvance reports the list terminator."
B3b_A7c56 = "Loads the persisted settings window-base index from NVRAM byte 0x1EF6, validated by complement mirror 0x1EF7 and clamped against 0x0736. Invalid mirrors or out-of-range values are repaired through Settings_RepairPersistentWindowBaseIndex."
B3b_A7c6c = "Repairs the persisted settings window-base index by recomputing the visible limit and resaving a clamped copy through Settings_SavePersistentWindowBaseIndex_A."
B3b_A7c75 = "Saves A as the persisted settings window-base index. Clamps it to 0x0736, enables NVRAM block A, writes 0x1EF6 plus complement mirror 0x1EF7, disables the block, and refreshes 0x072F/0x0730 from the current cursor offset."
B3b_A7c98 = "Returns current settings pending/window-base offset byte 0x072F in A."
B3b_A7c9c = "Service/status hook that may advance or prompt the operator/settings window when no menu task/effect is active. It gates on 0x0384, active task/effect IDs, remaining scroll budget, statebit polarity, starts display scene 0x15, manages retry counter 0x17B2, may persist the current window base, and can spawn helper effect 0x0072."
B3b_A7d10 = "Status-mode helper used from fixed ROM. When logic event 0xA001 is inactive and the persisted settings window index has not reached the visible limit, it suppresses the generic award/status ping; otherwise it calls AwardPoints_AAEB."
B3b_A7d26 = "Draws the operator/settings more-rows prompt when B == 1 and persisted index 0x1EF6 is below visible limit 0x0736. Clears DMD field 0x96, displays formatted string 0x81DF in field 0x95, and returns carry clear when drawn."
B3b_A7d77 = "Type-4 decrement API for the stored upper/current target in scratch byte +4. If already zero it panics 0x7E, invokes callback opcode 0x21, and detaches; otherwise it decrements byte +4 and enters the normal decrement/apply refresh path."
Bff_Afbd3 = "Inline wrapper for Settings_TestStateBitWithPolarity. Consumes one statebit/descriptor ID byte from the caller stream into B, advances the return address, tests it with descriptor polarity handling, and preserves B/X."
Bff_Ad308 = "DMD glyph blit shift dispatcher. Selects one of eight un-clipped glyph merge kernels from DMD_GlyphBlit_ShiftKernelTable using DMD_BLIT_X & 7. Side effects are the selected kernel writes into the active DMD buffer."
Bff_Ad496 = "Low-level DMD glyph blitter. A selects a glyph in the current glyph table. Uses DMD_DRAW_CURSOR_X/DMD_DRAW_BASELINE_Y as the origin, computes DMD_BLIT_X, DMD_BLIT_Y, DMD_BLIT_WIDTH_BYTES, DMD_BLIT_HEIGHT_ROWS and DMD_BLIT_SOURCE_PTR, calls DMD_GlyphBlit_ShiftDispatch, then advances DMD_DRAW_CURSOR_X to the next glyph position. Side effects: OR-merges glyph pixels into the active DMD buffer and rewrites DMD blit scratch RAM."
Bff_Ad79d = "Resolves DMD blit scratch into concrete source/destination state for the un-clipped glyph kernels. Loads source Y from DMD_BLIT_SOURCE_PTR, computes destination U/X from DMD_BLIT_Y plus DMD_BUFFER_BASE_PTR, stores DMD_BLIT_X into the bitshifter register, and stages DMD_BLIT_HEIGHT_ROWS as the row counter."
Bff_Ad7cd = "DMD row/bit-offset pointer helper. With B as pixel X and A as row Y, stores X into the bitshifter register, computes the current DMD buffer row pointer under DMD_BUFFER_BASE_PTR, returns X at the row base, and preserves caller B."
B2f_A5c63 = "DMD rectangle clear/AND-mask primitive. Uses DMD_BLIT_X, DMD_BLIT_Y, DMD_BLIT_WIDTH_BYTES and DMD_BLIT_HEIGHT_ROWS to clear the selected rectangular pixel region in the current DMD buffer. The one-byte-wide path stages DMD_RECT_BOTTOM_Y. Side effects: destination pixels are cleared and scratch bytes 0x0098 plus ISR temporaries are reused."
B2f_A5d47 = "DMD rectangle toggle/XOR primitive. Uses DMD_BLIT_X, DMD_BLIT_Y, DMD_BLIT_WIDTH_BYTES and DMD_BLIT_HEIGHT_ROWS to invert the selected rectangular pixel region in the current DMD buffer. Used by high-score initials cursor/strip drawing. Side effects: destination pixels are toggled and scratch bytes 0x0098 plus ISR temporaries are reused."
Bff_Af304 = "DMD graphic/frame draw helper. B selects an indexed far graphic table, A selects the frame or glyph entry, and Y supplies packed X/Y. It splits DMD_DRAW_CURSOR_X/DMD_DRAW_BASELINE_Y into 16-bit graphic coordinates at 0x0604/0x0606, resolves/bank-switches to far graphic data, calls the clipped graphic blitter, and restores the previous ROM bank."
Bff_Af445 = "Core clipped DMD graphic/frame blitter. Uses A as frame index with descriptor X and graphic scratch coordinates 0x0604/0x0606, resolves per-frame offsets and dimensions, populates DMD_BLIT_SOURCE_PTR, DMD_BLIT_X, DMD_BLIT_Y, DMD_BLIT_WIDTH_BYTES and DMD_BLIT_HEIGHT_ROWS, then calls the clipped set/clear shift dispatchers when the frame intersects the DMD. Side effects: active DMD buffer pixels and DMD/graphic scratch RAM are rewritten."
Bff_Af5e2 = "Clipped graphic blit set-mask shift dispatcher. Selects one of eight OR/set kernels using DMD_BLIT_X & 7. The selected kernel calls DMD_GlyphBlit_SetupClippedTarget, then walks DMD_BLIT_HEIGHT_ROWS rows and DMD_BLIT_WIDTH_BYTES source bytes per row. Side effects: ORs source mask pixels into the active DMD buffer and clipping may shrink DMD_BLIT_WIDTH_BYTES."
Bff_Af822 = "Shared DMD clipped-blit setup. Computes the destination pointer from DMD_BLIT_X/DMD_BLIT_Y and DMD_BUFFER_BASE_PTR, clips negative/out-of-range geometry, initializes clip skip bytes 0x0608..0x060A, selects source Y from DMD_BLIT_SOURCE_PTR, stages DMD_BLIT_HEIGHT_ROWS as the row counter, and may shrink DMD_BLIT_WIDTH_BYTES."
Bff_Af8d6 = "Clipped graphic blit clear-mask shift dispatcher. Selects one of eight AND-not/clear kernels using DMD_BLIT_X & 7. The selected kernel calls DMD_GlyphBlit_SetupClippedTarget and clears source-mask pixels from the active DMD buffer. Used by DMD_GraphicBlit_DrawFrameCore for graphic descriptors with the clear-mask marker."
Bff_Ad255 = "Selects DMD plane A. Stores caller A in DMD_PLANE_A_CACHE and writes the same value to the DMD plane-A hardware register. Side effect: cached and hardware plane-A selection change."
Bff_Ad25c = "Selects DMD plane B. Stores caller A in DMD_PLANE_B_CACHE and writes the same value to the DMD plane-B hardware register. Side effect: cached and hardware plane-B selection change."
Bff_Ad263 = "Selects DMD_FRAMEBUFFER_3800 as the active software draw buffer by storing its base pointer into DMD_BUFFER_BASE_PTR. Preserves X."
Bff_Ad26d = "Selects DMD_FRAMEBUFFER_3A00 as the active software draw buffer by storing its base pointer into DMD_BUFFER_BASE_PTR. Preserves X."
Bff_Ae214 = "Selects cached DMD plane A at DMD_PLANE_A_CACHE as the active/visible plane through dmd_set_active_plane_A. Preserves A and updates DMD_ACTIVE_PLANE_CACHE plus the active-framebuffer hardware register."
Bff_Ae21e = "Selects cached DMD plane B at DMD_PLANE_B_CACHE as the active/visible plane through dmd_set_active_plane_A. Preserves A and updates DMD_ACTIVE_PLANE_CACHE plus the active-framebuffer hardware register."
B3b_A6ec3 = "DisplaySceneDescriptorTable_Main row 22. Selects DMD draw planes, clears the active DMD page, formats string 0xC076 into STRING_BUFFER, draws it left-aligned at packed coordinate 0x200B, then draws a horizontal graphic-glyph fill using glyph IDs 0x02 and 0x03 through DisplayScene22_DrawGlyphAdvanceCursorAndDecCounter. Finishes with a page flip, DisplayEffect 0xF0, and foreground-scene task entry."
B3b_A6ee5 = "Row-22 internal loop that repeatedly draws graphic glyph ID 0x02 through DisplayScene22_DrawGlyphAdvanceCursorAndDecCounter while advancing Y from DMD_DRAW_CURSOR_X and consuming the caller stack counters."
B3b_A6ef1 = "Row-22 internal loop that repeatedly draws graphic glyph ID 0x03 through DisplayScene22_DrawGlyphAdvanceCursorAndDecCounter until that helper's stack-counter decrement reaches zero."
B3b_A6eff = "Row-22 internal DMD graphic-glyph emitter. A is the glyph/frame ID, B is the bank-specific font/graphic table selector, and Y is the packed draw coordinate. Calls DMD_DrawGlyphFromBankFontTable_A, reloads Y from DMD_DRAW_CURSOR_X so the next call continues at the advanced X cursor, decrements the caller's stacked loop counter at 2,S, and returns condition codes from that decrement. Side effects: active DMD buffer and DMD draw cursor scratch are updated."
B3b_A6f0f = "DisplaySceneDescriptorTable_Main row 3 far target after its six-byte descriptor prefix. Reserves one stack byte, then enters the player-score cycling foreground loop at DisplayScene03_PlayerScoreCyclerLoop."
B3b_A6f11 = "Player-score cycling foreground loop for display scene row 3. Copies page 3A00 to 3800, spawns the inherited-context refresh worker B3b_A6F2E, pulses DisplayEffect 0x03 until PlayerDisplayCallbacks_TestAndClearDirtyLatch accepts, stops the current display task, redraws the current-player score via B3b_A7196, then repeats."
B3b_A7183 = "Draws score/status lines for all active players. Clears the DMD page, loops PlayerCount_GetClamped times through B3b_A71A3 to format and draw each player score line, then runs the layout/tail helper B3b_A72F9. Used as the restart/foreground-refresh callback in the player-score DisplayScene descriptor prefixes."

Bff_Aeeac = "Service/diagnostic Up-switch handler. Runs a fixed sequence of banked reset/relight helpers for jackpot, swamp, bear-kick, mansion/window, GREED, Extra Ball, Seance, display-scene callback state, and related feature pools, then clears ADVANCE_X_LIMITED_AWARD_COUNT (0x0589) and returns carry clear."
Bff_Aef27 = "Local Up-handler helper. If encoded jackpot lamp 0x43 is active, far-calls SettingsRow05_StoreWindowDerivedValue to store the window-derived value into settings/feature row 5; otherwise it returns without side effects."
B34_A642e = "Up-handler cleanup helper. If logic event 0x1701 is inactive, clears encoded lamp 0x4B (center-left jet layer 0x48); otherwise leaves it unchanged."
B2f_A479f = "Shared major-mode lamp refresh bundle. Rebuilds jackpot/electric-chair/start lamps, Seance lamps, Thing-shot award lamps, Big Multiball chair-start lamp, Bank-36 and Bank-34 mode lamps, jackpot lamp gate state, and related mansion/window lamps."
B2f_A4774 = "Stores the window-derived value for settings/feature row 5. Computes the value from Settings_LoadPersistentWindowBaseIndex through the B2F_A4785 mapper, then calls Settings_SetCurrentValue_B with A=5."
B2f_A4756 = "Stores the current adjustable value for settings/feature row 5. Reads Settings_IsCurrentEntryAdjustable for row 5, optionally waits one tick for values above 2, and writes the returned value back through Settings_SetCurrentValue_B."
B2f_A605a = "Up-handler bear-kick/extra-ball award-buffer reset. Rebuilds the five-byte award buffer at 0x05EF from score template 0x12 or the bank-38 saved row when bear-kicks lamp 0x4F is active, clears lamp 0x4F when consumed, and always clears extra-ball lamp 0x42."
B2f_A6098 = "Clears the two mode-0x04 lamp-effect streams selected by words 0x0500 and 0x0540. Used by the Up-handler to stop the paired bear-kick/extra-ball lamp stream state."
B2e_A41e4 = "Jackpot lamp gate updater. Tests serve/live gates, active DisplayEffect IDs, Thing Multiball/Super Jackpot state, and several lamp gates, then chooses the set/clear path for the related jackpot/jet lamp program and refreshes downstream lamp state."
B2e_A551c = "Swamp-million/jet award reset and relight helper. Sets upper-left jet lamp 0x49, clears or rebuilds lower-swamp-million lamp 0x48 state, walks the associated award/jet rows, and preserves caller A/B/X."
B3d_A7412 = "Extra Ball pending-award reset. Services any consumed extra-ball marker task, clears pending counter 0x0586, and refreshes the Extra Ball lamp according to award-limit and FeatureState slot 3."
B36_A6b74 = "Installs the bank-36 default display-scene command callback by passing DisplayScene_DefaultModeCommandCallback to DisplayScene_SetDefaultCallback_X_B."
B36_A6b80 = "Default display-scene command callback installed by DisplayScene_SetDefaultModeCommandCallback. Queues command descriptors 0x0D, 0x1B, 0x28, and 0x2F when their corresponding DisplayEffect IDs are active."
B36_A77e8 = "Clears the five-byte mansion/window pool at 0x06DF..0x06E3."
B3b_A6516 = "Clears the five-byte mansion/window pool at 0x06EC..0x06F0 and clears latch/counter 0x06F1."
B3b_A66df = "Clears the five-byte mansion/window pool at 0x06F8..0x06FC."
B34_A7a5c = "Resets Advance-X/progress FeatureState slot 4 to 1 and lights logical lamp 0x31 (Lite Advance X)."
B2f_A4f15 = "Clears the GREED R encoded lamp/effect 0xD2."
B3d_A6fb1 = "Clears the Seance award step counter at RAM 0x0587."
B2f_A62ee = "If logic event 0x0C00 is active, clears FeatureState slot 0x14; otherwise returns without side effects."
B36_A6a78 = "Swamp-million special-lamp refresh. If logic event 0x1301 is inactive, clears encoded center-swamp-million lamp 0x57, then updates the left/right Special lamps from that lamp state."
B36_A68a9 = "Preserved-register variant of EndOfBall_ClearFeatureSlot08_AndLampC2. Clears FeatureState slot 0x08 and encoded lamp/effect 0xC2 while preserving A/B/X."
B36_A68b7 = "Extra Ball/feature cleanup gate. If logic event 0x1601 is inactive, clears FeatureState slot 0x08 plus lamp 0xC2 through ExtraBall_ClearSlot08AndLampC2_PreserveABX, then clears FeatureState slot 0x0B."

B3d_A77c9 = "Advance-X limited-award gate. Requires B2F_A51FE to accept, DisplayEffect 0x00B3 to be inactive, ADVANCE_X_LIMITED_AWARD_COUNT (0x0589) < 2, and cooldown word 0x058D == 0. On success increments the counter, sets 0x058D to 0x05DC, runs AdvanceX_PulseLampAndDisplayLimitedAward, and returns carry clear; failure returns carry set without side effects."
B3d_A77f9 = "Advance-X limited-award presentation helper. Pulses encoded lamp/effect 0xDA (Advance X), then displays award 0xB1 or 0xB2 depending on whether the lamp/effect test reports active after the pulse."
B3d_A710e = "DisplayEffect table entry that optionally runs AdvanceX_TryLimitedAwardGate after B3D_A7148 accepts; on gate success it displays award 0x29 before continuing with the normal 1000-point/lamp follow-up path."
B3d_A719a = "DisplayEffect table entry that runs AdvanceX_TryLimitedAwardGate; on gate success it displays award 0x2A before continuing with the normal 1000-point and Lite 2 Bear Kicks follow-up path."
B3d_A71b8 = "DisplayEffect table entry that first far-calls B34_A7A69, then runs AdvanceX_TryLimitedAwardGate; on gate success it displays award 0x2C before continuing with the normal follow-up path."

[table_docs]
B33_A6c45 = "English test-lamp pointer table. Row 0 is NULL\; rows 1..64 are the logical playfield lamp names used to interpret LampEffectStream IDs after LampEffect_NormalizeIdAndLayer."
B34_A73ff = "Eight-entry mansion/window award dispatch table. RAM 0x06C0 is shifted left and used as an index, so rows 0..7 select which optional award presenters run before the common MansionAwardFinale_Run_B tail."
B3b_A5588 = "Counted ptr16 data table with 23 short zero-terminated lists used by lamp-effect stream opcodes, especially list/range helpers."
B3b_A55b9 = "Counted ptr16 data table with header 00 1D 02. It is the main lamp-effect stream directory selected through CoreFarResourceTable row 4 and contains 29 stream entry pointers into B3b_A5646..B3b_A5A66."
B3b_A5a09 = "Operator/settings root counted pointer table embedded after the final bank-3B lamp-effect stream terminator. Header 00 07 02 means seven two-byte page pointers at 0x5A1A, 0x5A1E, 0x5A29, 0x5A34, 0x5A3E, 0x5A48, and 0x5A53. Row 0 is no-op callback Bff:8F96; rows 1..6 use callbacks B2f:4C3C, 4D41, 4E32, 4FBF, 5071, and 51F0. Settings_Init/Settings_GetEntryWorkspace_U use this root to resolve descriptors and allocate five scratch bytes per row."
B3d_A4bce = "Two 7-byte high-score descriptors. Row 0 points to H.S.T.D. top-4 storage at 0x1C75 with checksum block 0x85 and default pointer 0x816C\; row 1 points to the single Grand Champion row at 0x1C97 with checksum block 0x86 and default pointer 0x816F."
B3d_A5a6d = "Main DisplayEffect descriptor table. Header 00 48 0B means 72 rows of 11 bytes, covering IDs 0x01..0x48. Row 11 / ID 0x0C is the Seance/live handoff into BallStart_LiveEntryTask."
B3d_A5e78 = "Score award template table behind CoreFarResourceTable row 12 / fixed pointer 0x8204. Header 00 2B 04 means 43 rows of four packed-BCD bytes\; Score_AddAwardTemplate* frontends use the row index as the award ID."
B3d_A68f5 = "Command descriptor table used by CommandDescriptor_QueueOrExecute. Rows 0x39 and 0x3A dispatch the two confirmed easter eggs."
B3d_A6b81 = "Display scene descriptor table. Scene 0x5E is the credits easter egg\; scene 0x5F is When Cows Fight."
B3d_A79f0 = "Driver/output bit descriptor table with header 00 25 05. Each row is shadow-pointer word, hardware/mirror-pointer word, active-low bit mask\; rows 1..8 map latch 0x3FE1, rows 9..16 latch 0x3FE3, rows 17..24 latch 0x3FE2, rows 25..28 latch 0x3FE0, and rows 29..36 target RAM/mirror pair 0x00A0/0x0549."
B3d_A7c41 = "Extended DisplayEffect descriptor table. Header 00 09 0B covers IDs 0x80..0x88. Rows 0x81..0x88 dispatch SecretInput_ExtendedEffectGateTask\; only IDs 0x82 and 0x84 drive the hidden sequence detector."
Bff_A8001 = "Master Switch Dispatcher. Indices 0-7: Dedicated, 8-71: Matrix 11-88."
Bff_A81e0 = "Fixed-bank far resource table. Row 4 is the LampEffectStreamDirectory used by LampEffectStream_SelectDirectoryEntry_A\; row 5 is DisplayEffectDescriptorTable_Main."
Bff_Aafc8 = "Lamp-effect stream control opcode table for compact conditional/repeat blocks inside lamp animation streams."
Bff_Aafd2 = "LampEffectStream primary opcode dispatch for stream bytes 0x80..0x89. Row format is argument length byte plus ptr16 handler\; the decoder skips the declared argument length after each handler call."
Bff_Ae756 = "Logical-to-physical lamp remap table. Each row is a logical lamp ID and the typed byte is the physical matrix bit from taf-lampmatrix.csv\; the two notable swaps are logical 0x08<->physical 0x18 and logical 0x28<->physical 0x30."
Bff_Afb93 = "Inline settings callback trampoline. Consumes one parameter byte into B, then calls the current-bank settings dispatcher at 0x76E2, which reads the active settings-entry workspace and far-calls its handler with caller A plus inline B. Preserves B/X in the fixed-bank wrapper\; handler side effects are settings-entry specific."
Bff_A847c = "Inline award/output-script runner with default scale 0x40. Consumes one table ID byte, walks the script table at 0x81DD, triggers encoded driver-output effects, and services encoded delay tokens through the scheduler delay helper. Side effects include output-effect queue/latches and task delay/yield."
Bff_A8788 = "Inline timed relay/triac pulse helper. Consumes mask/timing bytes, clears matching pending timed-relay masks, and either sets the low five relay/triac bits immediately or queues them in the 0x03DB..0x03E3 timed-mask area depending on low-power/timing state."
Bff_Afb4b = "Inline bank-3B lamp-effect stream frontend. Consumes a two-byte stream selector into D/X, runs mode 0x04 via a bank-3B callback, tracks stream state bytes, sets the lamp/shadow bit when needed, and advances the lamp blink phase for selector low byte 0x40."
Bff_A858c = "Inline DMD field clear/fill helper. Consumes a DMD field ID byte, resolves the field, builds the space glyph/cell from ASCII 0x20, and rewrites the selected field area. Side effects are DMD buffer writes and the DMD dirty mark from field resolution."
Bff_Ae1eb = "Selects DMD draw planes from mode flag <0x97> and activates draw buffer 0x3800. If <0x97> == 1 it selects plane A=2/B=1\; otherwise plane A=1/B=2. Preserves A and updates plane/cache and active draw-buffer state."
Bff_Afb27 = "Inline bank-3B lamp-effect stream frontend. Consumes a two-byte stream selector into D/X, runs mode 0x0C through a callback that tracks prior active/inactive state, applies lamp set/clear effects, and uses lamp blink phase offset handling for selector low byte 0x40."
Bff_A8455 = "Inline relay/triac clear helper. Consumes one mask byte, keeps the low five bits, clears matching pending timed-relay masks, then clears those bits from latch <0x7A> and _RELAYS_TRIAC."
Bff_A8448 = "Inline relay/triac set helper. Consumes one mask byte, keeps the low five bits, clears matching pending timed-relay masks, then sets those bits in latch <0x7A> and _RELAYS_TRIAC."
Bff_Ad2db = "Copies a full 32-row DMD page/window from source Y to destination U by calling the row-copy core with B=0x20. Preserves B in the wrapper\; destination DMD page/window is overwritten."
Bff_A8688 = "Inline bank-3A display-scene pulse helper. Consumes a count byte in A, repeatedly runs the two bank-3A gate/service checks, starts DisplayEffect 0x01 between successful iterations, and returns carry set with A=failed gate index when either check rejects."
Bff_Aac61 = "Stores A into byte +0x2D of the current task block after resolving the current task or panicking. Used by descriptor/effect code to seed current-task descriptor state. Side effect is the current task block write."
Bff_A9d2b = "Stops the display/effect instance associated with the current task. Resolves the current task, loads the descriptor/ID word from task offset +0x11 into Y, and calls DisplayEffect_StopById_Core. Preserves X/Y."
Bff_Abfad = "Default sound-command sender for command word Y. Calls the gated sound-send path with flags D=0, so hook state at 0x17A6/[Bff_A812A] can suppress the send\; accepted commands update sound RAM 0x0442/0x0446/_BACKGROUND_MUSIC_PLAYING and write through the sound-card output path."
Bff_Af822 = "Shared DMD glyph/blit clipping setup. Computes the destination pointer from active draw buffer plus x/y coordinates, clips negative/out-of-range geometry, initializes blit scratch bytes 0x0608..0x060A, selects source Y from glyph data, and prepares the row count used by shift/blit kernels."
Bff_A9860 = "Task delay/yield helper using B as tick count. Stores B in <0x62>, clears the minute/timer rollover byte, snapshots the current task CPU context, and yields through the scheduler delay path."
Bff_A840c = "Inline driver-output effect enqueue helper. Consumes one effect token byte and appends it to the output-effect queue without the wait/service wrapper used by the trigger helpers. Preserves caller A around the enqueue core."
Bff_A8462 = "Inline GI mask-on helper. Consumes a GI mask byte, writes 0x80 into selected GI_BRIGHTNESS entries, then reapplies the GI/relay state through the shared brightness-to-relay service. Side effects include GI_BRIGHTNESS and relay/triac latch updates."
Bff_A8437 = "Inline primed output-effect trigger. If the output-effect queue is empty it first enqueues token 0, then enqueues the inline token and services/waits through DisplayEffect 0x01 until the queue state advances."
Bff_Ab64b = "Resolves DMD field ID A to the active field descriptor. Normal IDs use the fixed descriptor table, negative/custom IDs can resolve through the current task child block and panic with 0x34 if missing. Returns field buffer/count metadata and marks the DMD dirty bit."
Bff_A8678 = "Inline bank-3A display-scene state setter. Consumes one byte and stores it to display-scene state RAM 0x17A4 through B3a_A59C6. Side effect is only the 0x17A4 state update in the far callee."
Bff_A985c = "Task delay/yield helper using A as tick count. Stores A in <0x62>, clears the minute/timer rollover byte, snapshots the current task CPU context, and yields through the scheduler delay path."
Bff_Aa1b6 = "Maps a display text character in A to the special-glyph word returned in Y. Space maps to zero, comma/period/colon map to compact punctuation glyph offsets, and other characters fall through with the original A/high byte. Preserves A/B but leaves condition codes from the mapping path."
Bff_Afba4 = "Settings/state-bit polarity test. Selects the StateBit/DisplayEffect descriptor table through the fixed far-pointer entries at 0x81EF or 0x8246, reads descriptor byte +7 flag bit 0x10, tests primary state bit B, and returns the result inverted when that polarity flag is set. Preserves A/B/X."
Bff_A83ad = "Inline DisplayEffect slot-counter reader. Consumes one effect ID byte into B, reads the main or extended DisplayEffect slot counter, and returns condition codes from counter-1 while preserving B/X."
Bff_A8668 = "Inline ball-transition display reset gate. Consumes one gate/profile byte and far-calls the bank-38 transition helper\; when the far gate accepts, it resets command/display-scene runtime and foreground display state."
Bff_Ab917 = "Copies STRING_BUFFER to destination Y using the bounded 44-byte string copy core. Preserves X and stops at NUL\; if no terminator appears in 44 bytes the destination is forced NUL-terminated and panic byte 0x6F is emitted."
Bff_Ad67e = "Draws glyph A using the bank-specific far font/glyph table selected from Bff_A82B8 by the caller's ROM bank. Stores coordinate Y in 0x0545, bank-switches to the glyph data, calls DMD_BlitGlyph_A, then restores the previous ROM bank."
Bff_Ae1db = "Default DMD draw-plane setup. Selects plane A=1 and plane B=2, activates draw buffer 0x3800, and preserves A. This is the non-conditional counterpart to DMD_SelectDrawPlanesByMode97."
Bff_Ad2ce = "Copies the full DMD page/window from DMD_FRAMEBUFFER_3A00 to DMD_FRAMEBUFFER_3800 using DMD_CopyFullPage_Y_To_U. Preserves Y/U\; destination page 0x3800 is overwritten."
Bff_A8872 = "Inline lamp-effect stream frontend. Consumes a two-byte stream selector into D/X, runs the mode-0x04 lamp stream callback that records inactive/shadow state into stream work bytes 7/8, and returns the stream operation status in condition codes."
Bff_Aa5b6 = "Converts a 4-nibble packed BCD value in D to a binary 16-bit value in D. Multiplies successive nibbles by 1000, 100, 10, and 1, accumulates the result, and preserves X/U."
Bff_Aaca2 = "Clears descriptor flag bit 0x10 in byte +0x2E of the current task block after resolving the current task or panicking. Used by descriptor/lamp-effect task setup paths to disable that current-task mode flag."
Bff_Ab8d2 = "Bounded NUL-terminated string copy from X to Y with a 44-byte limit. Preserves A/B/X/Y\; if the source has no terminator inside the limit it emits panic byte 0x6F and forces the final destination byte to NUL."
Bff_Abf94 = "Gated sound-command sender. With command word in Y and flags/selector in D, tests sound hook state 0x17A6, calls the hook vector at [Bff_A812A], and only on accepted status forwards to the sound-card command writer. Preserves A/B\; may update sound RAM and hardware output."
Bff_A8345 = "Inline NVRAM/audit event recorder. Consumes one event byte, far-calls the bank-3D recorder that updates checksum-protected NVRAM audit/history slots, dispatches fixed text 0x8051, and when task stop-hook flag 0x037F is set raises return code 0x23."
Bff_Aa44a = "Unsigned multi-byte division helper. Treats X as dividend, Y as divisor, U as quotient/work output, and A as byte count\; performs shift/subtract division over A bytes, returns carry set for divide-by-zero/fallback copy, and writes quotient bytes through U."
Bff_Ab418 = "DMD string display core for source pointer X. Resolves field ID A, measures tokenized string length, applies B alignment/format flags including centering/right/blanking behavior, and renders glyph triplets into the resolved DMD field. Side effects include DMD field writes and dirty marking."
Bff_Ae26b = "Clears the active DMD buffer status/text area near active buffer +0x0200. Normally writes a zeroed block sequence\; when display state 0x0338 bit 0x20 is set it uses the shorter Bff_AE2C7 clear path. Preserves registers and writes zeros into the active DMD buffer."
Bff_Aa379 = "Pricing/profile helper that tests derived jumper/profile byte 0x03C9 against threshold 3 while preserving A. Callers use the returned condition codes (BLO/BHS) to select profile-specific display or award behavior."
Bff_Aa674 = "Pseudo-random byte generator. Maintains LFSR-like state in 0x17A1/0x17A2 and accumulator byte 0x17A3, initializes the state if both bytes are zero, and returns the next random byte in A. Side effects are updates to 0x17A1..0x17A3."
Bff_Aa79c = "Driver-output effect trigger/wait core for token A. Enqueues A into the output-effect queue with wait mode 0, repeatedly services DisplayEffect 0x01, and returns when the queue counter reaches the expected state. Side effects are output-effect queue activity and display-effect service ticks."
Bff_Aabc9 = "Counted-table row selector for an already resolved table header at X in bank B. A is the zero-based row index, the table header supplies count and row width, and the routine returns X at the selected row with carry clear or panics 0x27 and returns carry set on out-of-range index."
Bff_Ab920 = "Bounded string append helper. Finds the NUL terminator in destination Y within the 44-byte string window, then copies source X into the remaining space and forces a trailing NUL if the limit is reached. Preserves A/B/X/Y."
Bff_Ae2e1 = "Copies the 11-row status/text area at active DMD buffer +0x0150 to the paired DMD page obtained by toggling address bit 0x0200. Uses the full-row copy core with B=0x0B and preserves A/B/Y/U."
Bff_Af304 = "DMD graphic/frame draw helper. B selects an indexed far graphic table, A selects the frame or glyph entry, and Y supplies the draw coordinate. It resolves and bank-switches to the far graphic data, seeds DMD scratch coordinates 0x0604/0x0606, calls the clipped graphic blitter, and restores the previous ROM bank."
Bff_A87a2 = "Inline scaled award/output-script runner. Consumes a script table ID in A and scale byte in B, then runs the table-driven output script with B as the delay/scale factor. Side effects include driver-output effects and task sleeps encoded by the script."
Bff_Aabad = "Leaf entry for ROM_ReadWord_X_B. Reads a banked 16-bit word from X in ROM bank B and returns exactly like ROM_ReadWord_X_B, but exists as a separate direct-call entry for callers that do not need the preserving wrapper around it."
Bff_Ab93d = "Advances X to the NUL terminator of a string. Returns with X pointing at the terminator byte and preserves all registers except X."
Bff_Abedf = "Selects the currently active mansion/sound script slot and returns its pointer/state. If the secondary slot flag is active it uses 0x045F/0x0457, otherwise 0x0453/0x044B, returning Y from the slot pointer and D as the slot counter minus one."
Bff_Af3f9 = "DMD animation-frame draw and advance helper. B selects a far animation/graphic table, A is the current frame index, and X/Y are base coordinates. It applies signed per-frame offsets, draws through the clipped graphic blitter, advances A to the next frame with wrap from the frame table, returns updated A/B and Y, and restores X."
Bff_Afb5d = "Inline bank-3B lamp-effect stream frontend. Consumes a two-byte stream selector into D/X, runs mode 0x06 through the tracked set callback, records stream state bytes 7/8, and sets lamp/effect bits when the shadow bit is inactive."
Bff_Aa36e = "Pricing/profile helper that tests derived jumper/profile byte 0x03C9 against threshold 2 while preserving A. Callers use the returned condition codes to select profile-specific display, rule, or award behavior."
Bff_Aa526 = "16-bit multiply helper. Multiplies 8-bit A by the 16-bit value in U and returns the 16-bit product in U, preserving A/B. Used by BCD and score/math conversion paths."
Bff_Aa6aa = "Scaled pseudo-random helper. Treats input A as an upper scale, generates a random byte, multiplies random*scale, and returns the high product byte in A as an approximately uniform value from 0 to scale-1. Preserves B."
Bff_Aaafb = "Game-over/relay marker helper. Stores 0x80 into _GAMEOVER and ORs bit 0x80 into the relay/triac shadow and _RELAYS_TRIAC. Preserves caller A."
Bff_Aab33 = "Table-driven award/output-script runner using caller B as the scale byte. A selects the script row in table 0x81DD, script bytes below 0xFD trigger driver-output effects, and 0xFD..0xFF encode delay/scale control. Side effects include output-effect triggers and scheduler sleeps."
Bff_Aac93 = "Sets descriptor flag bit 0x10 in byte +0x2E of the current task block after resolving the current task or panicking. Used by descriptor/lamp-effect setup paths to enable that current-task mode flag."
Bff_Ab95e = "Tests whether the NUL-terminated string at X contains any non-space character. Returns carry clear for empty/all-space strings and carry set when a non-space byte is found. Preserves A/X."
Bff_Ae21e = "Selects the cached DMD plane-B value at 0x0548 as the active/visible plane through dmd_set_active_plane_A. Preserves A and updates <0x97> plus _DMD_ACTIVE_FRAMEBUF."
Bff_A8698 = "Inline bank-3A display-scene gate loop. Consumes one count byte, repeatedly runs the five-stage B3a_A5A15 gate/service check, starts DisplayEffect 0x01 between successful iterations, and returns carry set with A=failed gate index when any gate rejects."
Bff_A9fb6 = "Lamp/effect convenience wrapper. Uses A as the logical lamp/effect ID, forces layer selector B=0x40, and calls LampEffect_SetWithShadowBit. Preserves B\; side effects are lamp/effect shadow and logical lamp state updates."
Bff_A9fda = "Lamp/effect convenience wrapper. Uses A as the logical lamp/effect ID, forces layer selector B=0x00, and calls LampEffect_TestWithShadowBit. Preserves B and returns the test result in condition codes."
Bff_Aa3a5 = "Converts an unsigned big-endian integer at X, length A bytes, into packed BCD digits in place/adjacent work storage. It builds decimal divisor work buffers, repeatedly divides through UIntBytes_Divide_X_By_Y_To_U_CountA, and writes two BCD digits per output byte. Panics 0x21 when called with A=0."
Bff_Aa791 = "Sets the ball-tilted flag. Stores 1 into <_BALLTILTED> while preserving A."
Bff_Aaa56 = "Relay/triac timed pulse core. A supplies the low-five relay/triac mask and B the timing selector\; it clears matching pending timed masks, reads the timing logic value, then either sets the relay/triac latch immediately or queues the mask in 0x03DB..0x03E3."
Bff_Aac2c = "Fixed-bank counted-table row selector. Preserves B, forces B=0xFF, and calls CountedTable_SelectRow_A_TableXB for a table header already addressed by X in the fixed bank."
Bff_Ab358 = "DMD field clear/fill core. A selects the DMD field\; the routine maps ASCII space to the internal glyph/cell word, resolves the field descriptor, and writes space cells plus zero attributes over the field. Side effects are DMD field buffer writes and dirty marking from field resolution."
Bff_Ab946 = "Returns the length of the NUL-terminated string at X in A while preserving B/X. It increments A until the first NUL byte\; strings longer than 255 bytes would wrap A."
Bff_Abf80 = "Gated sound-command sender for command word D with flags 0x0004. Moves D to Y, calls Sound_SendCommandY_FlagsD_Gated with D=0x0004, and preserves A/B/Y. Accepted commands update sound RAM and write through the sound-card path."
Bff_Acaff = "Bank-39 DMD field-animation service helper. Far-calls the current task's type-0x06 animation child block handler with mode byte 0x10, which walks queued field-animation records, removes completed child blocks, and may sleep for accumulated delay ticks."
Bff_Ad523 = "Centered DMD glyph-string renderer. Uses the current far-string context and base coordinate in 0x0545, measures each tokenized line, adjusts x-position for centering, draws the glyph string, and handles inline bank/font changes before continuing."
Bff_Ae1c7 = "DMD FIRQ scanline disable hook. Calls the fixed far hook descriptor Bff_A80F7, and when accepted stores 0xFF to _DMD_FIRQ_SCANLINE while preserving caller A/CC. Current H-4 hook target is an RTS stub."
Bff_Ae214 = "Selects cached DMD plane A at 0x0547 as the active/visible plane through dmd_set_active_plane_A. Preserves A and updates <0x97> plus _DMD_ACTIVE_FRAMEBUF."
Bff_Ae488 = "Draws DMD full-frame image A from TABLE_DMD_FULLFRAME into the active DMD buffer. It resolves the far full-frame entry and dispatches through the frame decompression/draw worker rooted at Bff_AE496."
Bff_Af445 = "Core clipped DMD graphic/frame blitter. Uses A as frame index with descriptor X and scratch coordinates 0x0604/0x0606, resolves per-frame offsets and dimensions, populates glyph/blit scratch state 0x053D..0x0544/0x05FB..0x060B, and calls the clipped blit dispatcher when the frame intersects the DMD."
Bff_Af4fa = "Draws a graphic/frame from the fixed Bff_AE3D4 table. X/Y supply coordinates, B selects the far table entry, A selects the frame, and the routine bank-switches to the graphic data, calls DMD_GraphicBlit_DrawFrameCore, then restores the previous ROM bank."
Bff_A96cb = "Rebuilds DisplayEffect slot-counter tables from descriptor tables. Far-calls the bank-3D worker that copies descriptor byte +5 from rows of the main table 0x81EF into 0x174E.. and from extended table 0x8246 into 0x1797.. ."
Bff_A9f5b = "Lamp/effect convenience wrapper. Uses A as the logical lamp/effect ID, forces layer selector B=0x00, and calls LampEffect_SetWithShadowBit. Preserves B\; side effects are lamp/effect shadow and logical lamp state updates."
Bff_A9f64 = "Lamp/effect convenience wrapper. Uses A as the logical lamp/effect ID, forces layer selector B=0x00, and calls LampEffect_ClearWithShadowBit. Preserves B\; side effects are lamp/effect shadow and logical lamp state updates."
Bff_Af5f3 = "Eight-entry clipped graphic set-mask kernel table indexed by DMD_BLIT_X & 7. Rows 0..7 point to DMD_GraphicBlit_SetMaskShift0..7, which OR shifted source-mask bytes into the current DMD buffer while honoring clip skip bytes 0x0608..0x060A."
Bff_Af8e7 = "Eight-entry clipped graphic clear-mask kernel table indexed by DMD_BLIT_X & 7. Rows 0..7 point to DMD_GraphicBlit_ClearMaskShift0..7, which AND-NOT shifted source-mask bytes out of the current DMD buffer while honoring clip skip bytes 0x0608..0x060A."
B3b_A6f09 = "Six-byte DisplayScene descriptor prefix immediately after DisplayScene22_DrawGlyphAdvanceCursorAndDecCounter and before DisplayScene03_PlayerScoreCyclerEntry. Fields are sentinel word 0x728F checked by DisplayScene_ResolvePreviousDescriptor, mask-tail callback DMD_CopyPage3A00_To_3800, and restart/foreground-refresh callback PlayerScoreDisplay_DrawAllPlayers. It belongs to the following scene-3 player-score entry, not to the row-22 glyph helper."
